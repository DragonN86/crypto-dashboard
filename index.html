<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vo Will - WinTrack 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            background: #0d1117;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Chỉnh card Phase mượt hơn */
        .phase-card { 
            transition: all 0.3s ease;
            min-width: 260px; /* Độ rộng tối thiểu cho mobile scroll */
        }
        
        /* Hiệu ứng Phase Active */
        .phase-card-active {
            border-color: #f2cc60 !important;
            background: rgba(242, 204, 96, 0.1) !important;
            box-shadow: 0 0 20px rgba(242, 204, 96, 0.2);
        }
        .phase-card-accumulate {
            border-color: #3fb950 !important;
            background: rgba(63, 185, 80, 0.1) !important;
            box-shadow: 0 0 20px rgba(63, 185, 80, 0.2);
        }

        /* Tối ưu thanh scroll cho mobile */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Responsive Iframe Height */
        .iframe-wrapper { position: relative; width: 100%; overflow: hidden; background: #161b22; }
        .h-main { height: 500px; }
        .h-sub { height: 350px; }
        
        @media (min-width: 1024px) {
            .h-main { height: 650px; }
            .h-sub { height: 420px; }
            .phase-card { min-width: auto; }
        }
    </style>
</head>
<body class="text-[#c9d1d9] antialiased">

    <header class="px-4 py-6 lg:px-8 border-b border-[#30363d] sticky top-0 bg-[#0d1117]/80 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-2xl lg:text-3xl font-black text-white uppercase tracking-tighter italic">
                    WinTrack <span class="text-[#f2cc60]">2026</span>
                </h1>
                <p class="text-gray-500 text-[10px] lg:text-xs mt-1 font-medium">
                    STRATEGY: <span class="text-[#58a6ff]">DISCIPLINE</span> | USER: <span class="text-white">VOWILL</span>
                </p>
            </div>
            <div class="flex items-center gap-3 bg-[#1c2128] px-4 py-2 rounded-2xl border border-[#30363d] self-stretch md:self-auto justify-center">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                </span>
                <span class="text-[10px] font-mono uppercase tracking-widest font-bold">Live Analysis</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:p-8 space-y-8">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 lg:gap-8">

            <div class="border border-[#30363d] rounded-2xl overflow-hidden bg-[#161b22] shadow-xl">
                <div class="bg-[#1c2128] px-4 py-3 border-b border-[#30363d] text-[11px] font-bold uppercase tracking-wider flex items-center gap-2">
                    <span class="text-blue-400">📈</span> BTC Spot Technical (W1)
                </div>
                <div class="iframe-wrapper h-main">
                    <iframe src="technical-analysis.html" class="w-full h-full border-none"></iframe>
                </div>
            </div>

            <div class="border border-[#30363d] rounded-2xl overflow-hidden bg-[#161b22] shadow-xl">
                <div class="bg-[#1c2128] px-4 py-3 border-b border-[#30363d] text-[11px] font-bold uppercase tracking-wider flex items-center gap-2">
                    <span class="text-emerald-400">📊</span> BTC Spot Technical (D1)
                </div>
                <div class="iframe-wrapper h-main">
                    <iframe src="technical-day.html" class="w-full h-full border-none"></iframe>
                </div>
            </div>

            <div class="border border-[#30363d] rounded-2xl overflow-hidden bg-[#161b22]">
                <div class="bg-[#1c2128] px-4 py-3 border-b border-[#30363d] text-[11px] font-bold uppercase tracking-wider italic">
                    🌍 BTC Dominance
                </div>
                <div class="iframe-wrapper h-sub">
                    <iframe src="https://s.tradingview.com/widgetembed/?symbol=CRYPTOCAP%3ABTC.D&interval=D&theme=dark" class="w-full h-full border-none"></iframe>
                </div>
            </div>

            <div class="border border-[#30363d] rounded-2xl overflow-hidden bg-[#161b22]">
                <div class="bg-[#1c2128] px-4 py-3 border-b border-[#30363d] text-[11px] font-bold uppercase tracking-wider italic">
                    🔥 Leverage & Funding
                </div>
                <div class="iframe-wrapper h-sub">
                    <iframe src="leverage-signals.html" class="w-full h-full border-none"></iframe>
                </div>
            </div>

        </div>

        <section class="space-y-4">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                <h2 class="text-xl font-black uppercase tracking-tighter italic">Action Plan</h2>
                <div class="flex items-center gap-3 bg-[#1c2128] px-4 py-2 rounded-xl border border-[#30363d] text-[10px] font-mono">
                    <span id="current-phase" class="text-emerald-400 font-bold">PHASE 00</span>
                    <span class="text-gray-600">|</span>
                    <span id="phase-duration" class="text-gray-400">0m</span>
                </div>
            </div>
            
            <div class="flex lg:grid lg:grid-cols-4 gap-4 overflow-x-auto hide-scrollbar pb-4 sm:pb-0" id="phases-grid">
                </div>
        </section>

    </main>

    <footer class="text-center py-12 text-[#484f58] text-[10px] font-bold tracking-[0.3em] uppercase">
        © 2026 WinTrack v6.0 • Vo Will
    </footer>

    <script>
        let currentPhaseId = 0;
        let phaseStartTime = Date.now();
        let signals = { rsi: 50, fear: 50 };
        const STORAGE_KEY = "wintrack_phase_state_v6";

        const phaseConfig = [
            { id: 0, title: "DCA Accumulate", desc: "Extreme Fear Zone", status: "BUY" },
            { id: 1, title: "TP 1 (30%)", desc: "RSI > 58 / Fear > 68", status: "HOLD" },
            { id: 2, title: "TP 2 (50%)", desc: "RSI > 72 / Fear > 82", status: "SELL" },
            { id: 3, title: "Final Moon", desc: "Extreme Greed Zone", status: "EXIT" }
        ];

        function loadPhaseState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                currentPhaseId = data.phaseId;
                phaseStartTime = data.startTime;
            }
        }

        function initPhases() {
            const container = document.getElementById('phases-grid');
            container.innerHTML = phaseConfig.map(p => `
                <div id="phase-card-${p.id}" class="phase-card border border-[#30363d] p-5 rounded-2xl bg-[#161b22] flex-shrink-0 lg:flex-shrink">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] font-black uppercase text-gray-500 tracking-widest">Phase 0${p.id}</span>
                        <span id="badge-${p.id}" class="text-[9px] font-bold px-2 py-0.5 rounded-md bg-[#21262d]">${p.status}</span>
                    </div>
                    <h3 class="font-bold text-sm text-white">${p.title}</h3>
                    <p class="text-[10px] text-gray-500 mt-2 leading-relaxed">${p.desc}</p>
                </div>
            `).join('');
        }

        function activatePhase(id) {
            document.querySelectorAll('.phase-card').forEach(c => c.classList.remove('phase-card-active', 'phase-card-accumulate'));
            const card = document.getElementById(`phase-card-${id}`);
            const badge = document.getElementById(`badge-${id}`);
            
            if (id === 0) card.classList.add('phase-card-accumulate');
            else card.classList.add('phase-card-active');
            
            badge.className = `text-[9px] font-bold px-2 py-0.5 rounded-md ${id === 0 ? 'bg-emerald-500 text-black' : 'bg-[#f2cc60] text-black'}`;
            document.getElementById('current-phase').textContent = `PHASE 0${id} ACTIVE`;
            
            if (id !== currentPhaseId) {
                currentPhaseId = id;
                phaseStartTime = Date.now();
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ phaseId: currentPhaseId, startTime: phaseStartTime }));
            }
        }

        function updateDuration() {
            const mins = Math.floor((Date.now() - phaseStartTime) / 60000);
            document.getElementById('phase-duration').textContent = `${mins}m`;
        }

        loadPhaseState();
        initPhases();
        activatePhase(currentPhaseId);
        setInterval(updateDuration, 30000);
    </script>
</body>
</html>
