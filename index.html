<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vo Will - WinTrack 2026 | Crypto Exit System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        
        .phase-card { 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #30363d;
            position: relative;
            overflow: hidden;
        }
        
        .phase-card-active { 
            border-color: #f2cc60 !important; 
            background: rgba(242, 204, 96, 0.08) !important; 
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(242, 204, 96, 0.2);
        }

        .phase-card-accumulate { 
            border-color: #3fb950 !important; 
            background: rgba(63, 185, 80, 0.1) !important; 
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(63, 185, 80, 0.2);
        }
    </style>
</head>
<body class="min-h-screen p-4 lg:p-8">

    <header class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-10 pb-8 border-b border-[#30363d]">
        <div>
            <h1 class="text-5xl font-black text-white uppercase tracking-tighter">WinTrack <span class="text-[#f2cc60]">2026</span></h1>
            <p class="text-gray-400 text-sm mt-2 font-medium">
                Chiến lược: <span class="text-[#58a6ff]">"KỶ LUẬT LÀ SỨC MẠNH"</span> 
                <span class="mx-2 text-gray-600">|</span> 
                Vị thế: <span class="text-white">SPOT & LONG-TERM</span>
            </p>
        </div>
        <div class="mt-6 md:mt-0 flex items-center gap-4 bg-[#161b22] px-6 py-3 rounded-2xl border border-[#30363d]">
            <div class="flex flex-col items-end">
                <span class="text-[10px] text-gray-500 font-bold tracking-widest uppercase">System Status</span>
                <span class="text-xs font-mono text-green-400">LIVE ANALYSIS ACTIVE</span>
            </div>
            <span class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_10px_#3fb950]"></span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
            <div class="border border-[#30363d] rounded-3xl overflow-hidden bg-[#161b22]">
                <div class="bg-[#1c2128] p-4 border-b border-[#30363d] flex justify-between items-center">
                    <span class="text-xs font-bold text-gray-300">📈 BTC RSI (D1)</span>
                </div>
                <div class="h-[400px]"><iframe id="tech-frame" src="technical-analysis.html" class="w-full h-full border-none"></iframe></div>
            </div>

            <div class="border border-[#30363d] rounded-3xl overflow-hidden bg-[#161b22]">
                <div class="bg-[#1c2128] p-4 border-b border-[#30363d] flex justify-between items-center text-xs font-bold text-gray-300">📊 FEAR & GREED INDEX</div>
                <div class="h-[400px]"><iframe id="fear-frame" src="fear-greed.html" class="w-full h-full border-none"></iframe></div>
            </div>

            <div class="border border-[#30363d] rounded-3xl overflow-hidden bg-[#161b22]">
                <div class="bg-[#1c2128] p-4 border-b border-[#30363d] flex justify-between items-center text-xs font-bold text-gray-300">🌍 BTC DOMINANCE</div>
                <div class="h-[400px]"><iframe src="https://s.tradingview.com/widgetembed/?symbol=CRYPTOCAP%3ABTC.D&interval=D&theme=dark" class="w-full h-full border-none"></iframe></div>
            </div>

            <div class="border border-[#30363d] rounded-3xl overflow-hidden bg-[#161b22]">
                <div class="bg-[#1c2128] p-4 border-b border-[#30363d] flex justify-between items-center text-xs font-bold text-gray-300">🔥 LEVERAGE SIGNALS</div>
                <div class="h-[400px]"><iframe src="leverage-signals.html" class="w-full h-full border-none"></iframe></div>
            </div>
        </div>

        <section class="mb-10">
            <div class="flex flex-col md:flex-row justify-between items-end md:items-center mb-8 gap-4">
                <div>
                    <h2 class="text-3xl font-black text-white uppercase tracking-tight">KẾ HOẠCH HÀNH ĐỘNG</h2>
                    <p class="text-gray-500 text-sm mt-1">Hệ thống tự động quét tín hiệu mỗi 10 giây</p>
                </div>
                <div id="phase-info" class="bg-[#1c2128] border border-[#30363d] px-6 py-3 rounded-2xl flex items-center gap-4">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Current Status</span>
                        <span id="current-phase-text" class="text-sm font-bold text-white uppercase">Waiting for Data...</span>
                    </div>
                    <div class="h-8 w-[1px] bg-[#30363d]"></div>
                    <div class="flex flex-col">
                        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Duration</span>
                        <span id="phase-duration" class="text-sm font-mono text-[#58a6ff]">0 phút</span>
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="phases-grid"></div>
        </section>
    </main>

    <script>
        let currentPhaseId = -1;
        let phaseStartTime = Date.now();
        const STORAGE_KEY = "wintrack_2026_state";

        const phaseConfig = [
            { id: 0, title: "Tích lũy (GOM DẦN)", desc: "RSI < 32 & Extreme Fear. VSA cạn cung. Mua khi mọi người sợ hãi.", status: "ACCUMULATING", color: "text-emerald-400" },
            { id: 1, title: "Chốt 20-30%", desc: "RSI > 55. Bảo toàn vốn gốc. Hạ tỷ trọng khi thị trường ấm lại.", status: "TAKE PROFIT 1", color: "text-blue-400" },
            { id: 2, title: "Chốt 30-50%", desc: "RSI > 72 hoặc Fear > 80. Vùng hưng phấn cao. Chốt lời mạnh tay.", status: "TAKE PROFIT 2", color: "text-yellow-400" },
            { id: 3, title: "Gồng lãi cuối", desc: "Extreme Greed (>85). Dịch Trailing Stop chặt chẽ. Đợi tín hiệu đảo chiều.", status: "TRAILING STOP", color: "text-red-400" }
        ];

        function initPhases() {
            const container = document.getElementById('phases-grid');
            container.innerHTML = phaseConfig.map(p => `
                <div id="phase-card-${p.id}" class="phase-card p-8 rounded-[2rem] bg-[#161b22]">
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-[10px] font-black tracking-[0.2em] text-gray-500 uppercase">Phase 0${p.id}</span>
                        <span id="badge-${p.id}" class="text-[9px] font-black px-3 py-1 rounded-lg bg-[#0d1117] border border-[#30363d] text-gray-400 uppercase tracking-tighter">${p.status}</span>
                    </div>
                    <h3 class="font-bold text-xl text-white mb-3">${p.title}</h3>
                    <p class="text-xs leading-relaxed text-gray-400">${p.desc}</p>
                </div>
            `).join('');
        }

        function activatePhase(id) {
            if (currentPhaseId === id) return;

            phaseConfig.forEach((_, i) => {
                const card = document.getElementById(`phase-card-${i}`);
                const badge = document.getElementById(`badge-${i}`);
                if (card) card.className = "phase-card p-8 rounded-[2rem] bg-[#161b22]";
                if (badge) badge.className = "text-[9px] font-black px-3 py-1 rounded-lg bg-[#0d1117] border border-[#30363d] text-gray-400 uppercase tracking-tighter";
            });

            const activeCard = document.getElementById(`phase-card-${id}`);
            const activeBadge = document.getElementById(`badge-${id}`);
            
            if (id === 0) {
                activeCard.classList.add('phase-card-accumulate');
                activeBadge.className = "text-[9px] font-black px-3 py-1 rounded-lg bg-emerald-500 text-black uppercase tracking-tighter";
            } else {
                activeCard.classList.add('phase-card-active');
                activeBadge.className = "text-[9px] font-black px-3 py-1 rounded-lg bg-[#f2cc60] text-black uppercase tracking-tighter";
            }

            currentPhaseId = id;
            phaseStartTime = Date.now();
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ id, time: phaseStartTime }));
            
            document.getElementById('current-phase-text').textContent = `PHASE 0${id} - ${phaseConfig[id].status}`;
            document.getElementById('current-phase-text').className = `text-sm font-bold uppercase ${phaseConfig[id].color}`;
        }

        async function updateStrategy() {
            let rsi = null, fear = null;

            try {
                const techFrame = document.getElementById('tech-frame');
                const fearFrame = document.getElementById('fear-frame');
                
                const techDoc = techFrame.contentDocument || techFrame.contentWindow.document;
                const fearDoc = fearFrame.contentDocument || fearFrame.contentWindow.document;

                const rsiTxt = techDoc.getElementById('rsi-val')?.innerText;
                const fearTxt = fearDoc.getElementById('fear-val')?.innerText;

                if (!rsiTxt || !fearTxt) {
                    console.log("Chưa tìm thấy thẻ rsi-val hoặc fear-val");
                    return;
                }

                rsi = parseFloat(rsiTxt);
                fear = parseFloat(fearTxt);
                
                console.log(`Dữ liệu thực: RSI=${rsi} | Fear=${fear}`);
            } catch(e) { 
                console.error("Lỗi truy cập Iframe: Hãy chạy bằng Live Server!"); 
                return;
            }

            // --- CHIẾN LƯỢC QUYẾT ĐỊNH (FIXED LOGIC) ---
            if (rsi <= 35 && fear <= 30) {
                activatePhase(0); // Tích lũy
            } else if (rsi >= 70 || fear >= 80) {
                activatePhase(2); // Chốt mạnh
            } else if (fear > 85) {
                activatePhase(3); // Gồng lãi cuối
            } else if (rsi > 55 || fear > 60) {
                activatePhase(1); // Chốt gốc / Đợi chốt
            } else {
                // Vùng trung lập (Neutral): Nếu chưa có phase nào thì mặc định 1
                if (currentPhaseId === -1) activatePhase(1);
            }
        }

        function updateDuration() {
            const minutes = Math.floor((Date.now() - phaseStartTime) / 60000);
            document.getElementById('phase-duration').textContent = `${minutes} phút`;
        }

        window.onload = () => {
            initPhases();
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                currentPhaseId = data.id;
                phaseStartTime = data.time;
                activatePhase(currentPhaseId); // Khôi phục phase cũ ngay lập tức
            }
            
            setTimeout(() => {
                updateStrategy();
                updateDuration();
            }, 3000); // Đợi 3 giây để API trong Iframe kịp trả kết quả

            setInterval(updateStrategy, 10000);
            setInterval(updateDuration, 30000);
        };
    </script>
</body>
</html>
