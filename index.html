<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vo Will - WinTrack Ultimate 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0a0c12; color: #c9d1d9; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Hiệu ứng Phase Card */
        .phase-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); opacity: 0.3; filter: grayscale(1); border: 1px solid #30363d; }
        .phase-card.active { 
            opacity: 1; filter: grayscale(0); transform: translateY(-8px); 
            border-color: var(--accent) !important;
            box-shadow: 0 20px 40px var(--shadow);
        }

        .glass { background: rgba(22, 27, 34, 0.8); backdrop-filter: blur(10px); border: 1px solid #30363d; }
        .dot-status { animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="min-h-screen p-4 lg:p-10">

    <!-- HEADER -->
    <header class="flex flex-col md:flex-row justify-between items-center mb-8 pb-6 border-b border-[#30363d]">
        <div>
            <h1 class="text-5xl font-black text-white uppercase tracking-tighter italic">WinTrack <span class="text-[#f2cc60]">2026</span></h1>
            <p class="text-gray-400 text-xs mt-1 mono tracking-widest uppercase opacity-60 italic">Strategic Exit OS | Operator: vowill</p>
        </div>
        <div class="mt-4 md:mt-0 flex items-center gap-4 glass px-6 py-3 rounded-2xl shadow-2xl">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 bg-green-500 rounded-full dot-status"></span>
                <span class="text-[10px] font-black uppercase tracking-[0.2em]">Live Analysis Active</span>
            </div>
        </div>
    </header>

    <!-- SYSTEM HUD (BẢNG ĐIỀU KHIỂN TRÊN CÙNG) -->
    <div class="glass rounded-[2rem] p-6 mb-10 flex flex-wrap justify-between items-center gap-6 border-l-4 border-emerald-500 shadow-xl">
        <div class="flex flex-col">
            <span class="text-[10px] mono text-gray-500 uppercase font-bold tracking-widest">Trạng thái hiện tại</span>
            <div id="hud-phase-display" class="text-xl font-black text-white italic uppercase tracking-tight">Loading...</div>
        </div>
        <div class="hidden md:block h-10 w-px bg-gray-800"></div>
        <div class="flex flex-col">
            <span class="text-[10px] mono text-gray-500 uppercase font-bold tracking-widest">Thời gian duy trì</span>
            <div id="hud-duration" class="text-xl font-black text-[#f2cc60] mono leading-none">00:00:00</div>
        </div>
        <div class="hidden md:block h-10 w-px bg-gray-800"></div>
        <div class="flex flex-col min-w-[150px]">
            <span class="text-[10px] mono text-gray-500 uppercase font-bold tracking-widest">Hệ thống đồng thuận</span>
            <div id="confidence-score" class="text-xl font-black text-white italic">--%</div>
        </div>
    </div>

    <!-- MODULE GRID (4 IFRAMES) -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
        <div class="glass rounded-3xl overflow-hidden shadow-lg border border-slate-800/50">
            <div class="bg-[#1c2128] p-4 border-b border-[#30363d] text-[10px] font-black uppercase tracking-widest text-blue-400">📈 Technical Analysis</div>
            <iframe id="tech-frame" src="technical-analysis.html" class="w-full h-[360px] border-none"></iframe>
        </div>
        <div class="glass rounded-3xl overflow-hidden shadow-lg border border-slate-800/50">
            <div class="bg-[#1c2128] p-4 border-b border-[#30363d] text-[10px] font-black uppercase tracking-widest text-emerald-400">📊 Market Sentiment</div>
            <iframe id="fear-frame" src="fear-greed.html" class="w-full h-[360px] border-none"></iframe>
        </div>
        <div class="glass rounded-3xl overflow-hidden shadow-lg border border-slate-800/50">
            <div class="bg-[#1c2128] p-4 border-b border-[#30363d] text-[10px] font-black uppercase tracking-widest text-orange-400">🌍 BTC Dominance</div>
            <iframe src="https://s.tradingview.com/widgetembed/?symbol=CRYPTOCAP%3ABTC.D&interval=D&theme=dark" class="w-full h-[360px] border-none"></iframe>
        </div>
        <div class="glass rounded-3xl overflow-hidden shadow-lg border border-slate-800/50">
            <div class="bg-[#1c2128] p-4 border-b border-[#30363d] text-[10px] font-black uppercase tracking-widest text-red-400">🔥 Leverage Signals</div>
            <iframe src="leverage-signals.html" class="w-full h-[360px] border-none"></iframe>
        </div>
    </div>

    <!-- STRATEGY GRID -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="phases-grid"></div>

    <script>
        const STORAGE_KEY = "wintrack_persistent_state_v4";
        
        const phaseConfig = [
            { id: 0, title: "Tích lũy (DCA)", desc: "RSI < 32 + Extreme Fear", accent: "#10b981", shadow: "rgba(16, 185, 129, 0.2)" },
            { id: 1, title: "Chốt vốn 30%", desc: "RSI > 55 | Lợi nhuận > 25%", accent: "#3b82f6", shadow: "rgba(59, 130, 246, 0.2)" },
            { id: 2, title: "Take Profit 50%", desc: "RSI > 72 | Lợi nhuận > 60%", accent: "#f59e0b", shadow: "rgba(245, 158, 11, 0.2)" },
            { id: 3, title: "Gồng Moon Bag", desc: "Extreme Greed | Trailing Stop", accent: "#a855f7", shadow: "rgba(168, 85, 247, 0.2)" }
        ];

        // KHỞI TẠO STATE: Ưu tiên lấy từ máy, nếu không có mới tạo mốc bây giờ
        let savedState = JSON.parse(localStorage.getItem(STORAGE_KEY));
        let state = savedState || {
            phaseId: 0,
            startTime: Date.now()
        };

        function initUI() {
            const container = document.getElementById('phases-grid');
            container.innerHTML = phaseConfig.map(p => `
                <div id="card-${p.id}" class="phase-card glass p-8 rounded-[2.5rem] relative border-2 border-transparent" 
                     style="--accent: ${p.accent}; --shadow: ${p.shadow}">
                    <div class="flex justify-between items-start mb-6">
                        <span class="mono text-[10px] font-bold text-gray-500 tracking-widest uppercase">Phase 0${p.id}</span>
                        <div class="badge-active hidden px-3 py-1 rounded-full text-[10px] font-black bg-white text-black">ACTIVE</div>
                    </div>
                    <h3 class="text-2xl font-black text-white mb-4 tracking-tight">${p.title}</h3>
                    <p class="text-sm text-gray-400 leading-relaxed font-medium italic">${p.desc}</p>
                </div>
            `).join('');
            applyStateToUI();
        }

        function applyStateToUI() {
            phaseConfig.forEach(p => {
                const card = document.getElementById(`card-${p.id}`);
                const badge = card.querySelector('.badge-active');
                if (p.id === state.phaseId) {
                    card.classList.add('active');
                    badge.classList.remove('hidden');
                    document.getElementById('hud-phase-display').textContent = `Phase 0${p.id} - ${p.title}`;
                } else {
                    card.classList.remove('active');
                    badge.classList.add('hidden');
                }
            });
        }

        async function engine() {
            let rsi = 50, fear = 20;

            try {
                // Lấy dữ liệu thực từ iFrames
                const tech = document.getElementById('tech-frame').contentWindow;
                rsi = parseFloat(tech.document.getElementById('rsi-val')?.innerText) || 50;
                
                // Giả lập fear từ module (bạn có thể fetch API thật ở đây)
                const fearVal = 18; 
                document.getElementById('confidence-score').textContent = Math.round(100 - rsi) + "%";
            } catch(e) {}

            // LOGIC QUYẾT ĐỊNH PHASE
            let detectedPhase = state.phaseId;
            if (rsi < 32) detectedPhase = 0;
            else if (rsi > 72) detectedPhase = 2;
            else if (rsi > 55) detectedPhase = 1;

            // CHỐT CHẶN QUAN TRỌNG: Chỉ lưu và đổi mốc thời gian nếu Phase THAY ĐỔI thực sự
            if (detectedPhase !== state.phaseId) {
                state.phaseId = detectedPhase;
                state.startTime = Date.now(); // Reset mốc thời gian vì đã sang giai đoạn mới
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                applyStateToUI();
            }
        }

        function updateTimer() {
            const diff = Date.now() - state.startTime;
            const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
            const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
            document.getElementById('hud-duration').textContent = `${h}:${m}:${s}`;
        }

        // CHẠY HỆ THỐNG
        initUI();
        updateTimer(); // Gọi ngay lập tức để tránh hiện 00:00:00 khi load
        
        setInterval(engine, 5000);   // Phân tích dữ liệu mỗi 5s
        setInterval(updateTimer, 1000); // Cập nhật đồng hồ mỗi 1s

        // Load dữ liệu lần đầu sau khi iframe sẵn sàng
        setTimeout(engine, 2000);
    </script>
</body>
</html>
