<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vo Will - Crypto Exit System 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        
        /* Grid Layout: 3 cột trên Desktop, 2 trên Tablet, 1 trên Mobile */
        .dashboard-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); 
            gap: 1.5rem; 
        }

        .card-container { 
            background: #161b22; 
            border: 1px solid #30363d; 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 500px; 
            transition: all 0.3s ease; 
        }

        .card-container:hover { border-color: #58a6ff; transform: translateY(-2px); }

        .card-header { 
            padding: 12px 16px; 
            border-bottom: 1px solid #30363d; 
            background: #1c2128; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .card-title { font-weight: 700; font-size: 0.9rem; display: flex; align-items: center; }
        .card-tag { font-size: 10px; color: #8b949e; text-transform: uppercase; border: 1px solid #30363d; padding: 2px 6px; border-radius: 4px; }

        .widget-box { flex-grow: 1; width: 100%; background: #0d1117; }
        iframe { width: 100%; height: 100%; border: none; }

        .status-dot { height: 8px; width: 8px; border-radius: 50%; background-color: #3fb950; display: inline-block; margin-right: 8px; box-shadow: 0 0 8px #3fb950; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-6 lg:p-10">

    <header class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-[#30363d] pb-8 text-center md:text-left">
        <div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter">HỆ THỐNG GIÁM SÁT CHỐT LỜI <span class="text-yellow-500">2026</span></h1>
            <p class="text-gray-500 text-sm mt-1">Chiến lược: <span class="text-blue-400 font-bold">KỶ LUẬT LÀ SỨC MẠNH</span> | User: <span class="text-white font-semibold">will.eth</span></p>
        </div>
        <div class="mt-4 md:mt-0 px-4 py-2 bg-[#1c2128] rounded-md border border-[#30363d] flex items-center">
            <span class="status-dot"></span><span class="text-xs font-mono text-gray-300 tracking-widest uppercase">Live Market Data</span>
        </div>
    </header>

    <div class="dashboard-grid">

        <div class="card-container">
            <div class="card-header">
                <span class="card-title text-blue-400">📈 Technical Analysis</span>
                <span class="card-tag">W1 Signals</span>
            </div>
            <div class="widget-box">
                <iframe src="technical-analysis.html"></iframe>
            </div>
        </div>

        <div class="card-container">
            <div class="card-header">
                <span class="card-title text-orange-400">📊 Market Sentiment</span>
                <span class="card-tag">Fear & Greed</span>
            </div>
            <div class="widget-box">
                <iframe src="fear-greed.html"></iframe>
            </div>
        </div>

        <div class="card-container">
            <div class="card-header">
                <span class="card-title text-blue-300">🌍 BTC Dominance</span>
                <span class="card-tag">TradingView</span>
            </div>
            <div class="widget-box">
                <iframe src="btc-dominance.html"></iframe>
            </div>
        </div>

        <div class="card-container">
            <div class="card-header">
                <span class="card-title text-red-400">🔥 Leverage Signals</span>
                <span class="card-tag">Funding Rate</span>
            </div>
            <div class="widget-box">
                <iframe src="funding-rate.html"></iframe>
            </div>
        </div>

        </div>

    <footer class="text-center mt-12 pt-8 border-t border-[#30363d]">
        <div class="text-[#484f58] text-xs uppercase tracking-[0.4em] font-bold">
            © 2026 CRYPTO EXIT SYSTEM - VO WILL | @VOWILLHQ
        </div>
    </footer>

</body>
</html>
