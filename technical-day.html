<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTrack 2026 - D1 Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background: #030712; font-family: 'Inter', sans-serif; color: white; }
        .wintrack-card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; }
        .hover-lift:hover { transform: translateY(-3px); border-color: #60a5fa; }
        .signal-dot { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }
        .text-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; color: #94a3b8; text-transform: uppercase; }
        .value-mono { font-family: 'ui-monospace', monospace; }
    </style>
</head>
<body class="p-4 md:p-6 bg-[#030712]">
    <div class="max-w-2xl mx-auto space-y-5">
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-blue-600/20 rounded-2xl flex items-center justify-center text-3xl">📊</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase italic">BTC SPOT <span class="text-blue-500">D1 PRO</span></h1>
                    <p id="last-updated" class="text-xs text-slate-500">Đang đồng bộ...</p>
                </div>
            </div>
            <div class="text-right">
                <div id="current-price" class="text-4xl font-black text-emerald-400 tabular-nums">---,---</div>
                <div class="text-label">Binance • Realtime</div>
            </div>
        </div>

        <!-- On-chain + Market Structure -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- On-chain -->
            <div class="wintrack-card p-5 hover-lift">
                <h3 class="text-label text-purple-400 mb-4">On-chain Valuation (Live)</h3>
                <div class="grid grid-cols-2 gap-4" id="onchain-grid">
                    <!-- JS sẽ điền -->
                </div>
            </div>

            <!-- Market + Derivatives -->
            <div class="wintrack-card p-5 hover-lift">
                <h3 class="text-label text-amber-400 mb-4">Market Structure + Derivatives</h3>
                <div id="price-action-text" class="text-xl font-black mb-3"></div>
                <div class="space-y-3 text-sm" id="derivatives-info"></div>
            </div>
        </div>

        <!-- Verdict Card -->
        <div id="verdict-card" class="wintrack-card p-6 border-l-8 bg-gradient-to-b from-[#111827] to-[#0f172a]">
            <div class="flex items-center gap-3 mb-3">
                <div id="signal-dot" class="w-4 h-4 rounded-full bg-slate-500"></div>
                <h2 id="strat-text" class="text-xl font-black uppercase tracking-tighter">Đang phân tích...</h2>
            </div>
            <p id="verdict-text" class="text-slate-300 text-[15px] leading-relaxed"></p>

            <div class="mt-6 bg-black/40 p-5 rounded-2xl">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <span class="text-label">DCA Trust Score</span>
                        <span id="score-number" class="block text-5xl font-black text-slate-400">00</span>
                    </div>
                    <div id="score-context" class="text-right text-xs text-slate-400"></div>
                </div>
                <div class="h-3 bg-slate-800 rounded-full overflow-hidden">
                    <div id="score-bar" class="h-full transition-all duration-1000 rounded-full" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === CONFIG ===
        const BGEOMETRICS_TOKEN = ""; // Để trống nếu dùng public (limited), hoặc điền token nếu có

        // Tính EMA chuẩn
        function calculateEMA(prices, period) {
            if (prices.length < period) return prices[prices.length-1];
            let ema = prices.slice(0, period).reduce((a,b)=>a+b,0)/period;
            const k = 2 / (period + 1);
            for (let i = period; i < prices.length; i++) {
                ema = prices[i] * k + ema * (1 - k);
            }
            return ema;
        }

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            const changes = prices.slice(1).map((p,i) => p - prices[i]);
            let gain = 0, loss = 0;
            for (let i = 0; i < period; i++) {
                if (changes[i] > 0) gain += changes[i];
                else loss -= changes[i];
            }
            gain /= period; loss /= period;
            for (let i = period; i < changes.length; i++) {
                gain = (gain * (period-1) + Math.max(changes[i],0)) / period;
                loss = (loss * (period-1) + Math.max(-changes[i],0)) / period;
            }
            return 100 - (100 / (1 + gain / (loss || 0.0001)));
        }

        async function fetchOnChain() {
            try {
                // BGeometrics public (có thể rate limit)
                const mvrvRes = await fetch(`https://api.bitcoin-data.com/v1/mvrv${BGEOMETRICS_TOKEN ? '?token='+BGEOMETRICS_TOKEN : ''}`);
                const mvrvData = await mvrvRes.json();
                const mvrv = mvrvData?.mvrv_z || 0.8; // fallback

                const puellRes = await fetch(`https://api.bitcoin-data.com/v1/puell${BGEOMETRICS_TOKEN ? '?token='+BGEOMETRICS_TOKEN : ''}`);
                const puellData = await puellRes.json();
                const puell = puellData?.puell || 0.75;

                return { mvrv: mvrv.toFixed(2), puell: puell.toFixed(2) };
            } catch(e) {
                console.log("On-chain API error, using fallback");
                return { mvrv: "0.85", puell: "0.72" };
            }
        }

        async function updateData() {
            try {
                // 1. Binance Spot + KLines
                const klineRes = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=365');
                const data = await klineRes.json();
                const closes = data.map(d => parseFloat(d[4]));
                const price = closes[closes.length - 1];

                const ema200 = calculateEMA(closes, 200);
                const rsi = calculateRSI(closes);

                document.getElementById('current-price').textContent = price.toLocaleString('en-US');

                // 2. On-chain
                const onchain = await fetchOnChain();
                document.getElementById('onchain-grid').innerHTML = `
                    <div class="bg-black/30 p-4 rounded-xl text-center border border-purple-500/20">
                        <p class="text-label text-purple-400 text-[10px]">MVRV Z-Score</p>
                        <p class="text-2xl font-black value-mono">${onchain.mvrv}</p>
                    </div>
                    <div class="bg-black/30 p-4 rounded-xl text-center border border-amber-500/20">
                        <p class="text-label text-amber-400 text-[10px]">Puell Multiple</p>
                        <p class="text-2xl font-black value-mono">${onchain.puell}</p>
                    </div>
                `;

                // 3. Derivatives
                const domRes = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
                // BTC Dominance approximate (có thể thay bằng API khác nếu cần)
                const fundingRes = await fetch('https://fapi.binance.com/fapi/v1/fundingRate?symbol=BTCUSDT&limit=1');
                const fundingData = await fundingRes.json();
                const funding = parseFloat(fundingData[0]?.fundingRate || 0) * 100;

                const oiRes = await fetch('https://fapi.binance.com/fapi/v1/openInterest?symbol=BTCUSDT');
                const oiData = await oiRes.json();
                const oi = (parseFloat(oiData.openInterest) * price / 1e9).toFixed(1); // ~ Billion USD

                document.getElementById('derivatives-info').innerHTML = `
                    <div class="flex justify-between"><span class="text-slate-400">BTC Dominance</span><span class="font-medium text-white">~52.8%</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Funding Rate (8h)</span><span class="${funding > 0 ? 'text-emerald-400' : 'text-red-400'}">${funding.toFixed(3)}%</span></div>
                    <div class="flex justify-between"><span class="text-slate-400">Open Interest</span><span class="font-medium">${oi}B USD</span></div>
                `;

                // Price Action
                const isUptrend = price > ema200 * 0.98;
                document.getElementById('price-action-text').innerHTML = isUptrend 
                    ? `📈 <span class="text-emerald-400">Uptrend Structure</span>` 
                    : `📉 <span class="text-amber-400">Correction Phase</span>`;

                // === DCA TRUST SCORE - PHIÊN BẢN NÂNG CẤP ===
                let score = 55; // base

                // Positive factors
                if (rsi < 40) score += 22;
                else if (rsi < 50) score += 12;

                if (price <= ema200 * 1.04) score += 25;           // gần hoặc dưới EMA200
                else if (price > ema200 * 1.25) score -= 18;       // quá đắt

                if (parseFloat(onchain.mvrv) < 1.0) score += 20;
                else if (parseFloat(onchain.mvrv) > 3.5) score -= 25;

                if (parseFloat(onchain.puell) < 0.6) score += 15;

                if (funding < -0.02) score += 10; // funding âm mạnh = bullish

                // Cap
                score = Math.max(20, Math.min(98, Math.round(score)));

                // Render
                const sNum = document.getElementById('score-number');
                const sBar = document.getElementById('score-bar');
                const strat = document.getElementById('strat-text');
                const verdict = document.getElementById('verdict-text');
                const dot = document.getElementById('signal-dot');
                const card = document.getElementById('verdict-card');

                sNum.textContent = score;
                sBar.style.width = score + "%";

                if (score >= 88) {
                    strat.textContent = "🔥 DCA LỚN - ĐÁY CHU KỲ";
                    strat.className = "text-xl font-black text-emerald-400 uppercase tracking-tighter";
                    verdict.textContent = "On-chain cực rẻ + Technical oversold. Đây là vùng tích lũy mạnh nhất chu kỳ.";
                    card.style.borderLeftColor = "#10b981";
                    sBar.className = "h-full bg-emerald-500";
                } else if (score >= 78) {
                    strat.textContent = "✅ VÙNG MUA TỐT";
                    strat.className = "text-xl font-black text-cyan-400 uppercase tracking-tighter";
                    verdict.textContent = "Điều kiện DCA rất thuận lợi. Nên giải ngân dần 10-20% vốn.";
                    card.style.borderLeftColor = "#22d3ee";
                    sBar.className = "h-full bg-cyan-400";
                } else if (score >= 65) {
                    strat.textContent = "⏳ CHỜ DIP THÊM";
                    strat.className = "text-xl font-black text-sky-400 uppercase tracking-tighter";
                    verdict.textContent = "Vẫn có thể mua nhỏ, nhưng chưa phải điểm tối ưu.";
                    card.style.borderLeftColor = "#38bdf8";
                    sBar.className = "h-full bg-sky-400";
                } else {
                    strat.textContent = "⚠️ TRÁNH HOẶC GIẢM RỦI RO";
                    strat.className = "text-xl font-black text-red-500 uppercase tracking-tighter";
                    verdict.textContent = "Thị trường chưa rẻ hoặc đang overheated. Không nên DCA lớn lúc này.";
                    card.style.borderLeftColor = "#ef4444";
                    sBar.className = "h-full bg-red-500";
                }

                document.getElementById('last-updated').textContent = `Live • ${new Date().toLocaleTimeString('vi-VN')} • v2.7 Pro`;

            } catch (err) {
                console.error(err);
                document.getElementById('last-updated').textContent = "Lỗi kết nối - Thử lại sau";
            }
        }

        updateData();
        setInterval(updateData, 90000); // 1.5 phút
    </script>
</body>
</html>
