<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTrack 2026 - D1 Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background: #030712; font-family: 'Inter', sans-serif; color: white; -webkit-font-smoothing: antialiased; }
        .wintrack-card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-2px); border-color: #374151; }
        .signal-dot { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }
        .text-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.05em; color: #94a3b8; text-transform: uppercase; }
        .value-mono { font-family: 'ui-monospace', 'SFMono-Regular', monospace; }
    </style>
</head>
<body class="p-3 md:p-6 bg-[#030712]">
    <div class="max-w-2xl mx-auto space-y-4">
        
        <div class="flex items-center justify-between px-1 mb-2">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600/20 rounded-xl flex items-center justify-center text-2xl shadow-inner text-blue-500">📊</div>
                <div>
                    <h1 class="text-white font-black text-xl tracking-tighter uppercase italic">BTC SPOT <span class="text-blue-500">D1</span></h1>
                    <p id="last-updated" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider italic leading-none mt-1">Syncing...</p>
                </div>
            </div>
            <div class="text-right">
                <div id="current-price" class="value-mono text-3xl font-black text-emerald-400 tracking-tighter leading-none">---,---</div>
                <div class="text-label mt-1 italic">Binance Realtime</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <div class="wintrack-card p-4 border-t border-t-purple-500/20">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-label text-purple-400">On-chain Valuation</h3>
                    <div id="onchain-status" class="text-[9px] px-2 py-0.5 rounded-md bg-amber-500/10 text-amber-500 font-black uppercase border border-amber-500/20">Check...</div>
                </div>
                <div class="grid grid-cols-2 gap-3" id="onchain-grid">
                    </div>
            </div>

            <div class="wintrack-card p-4 border-t border-t-amber-500/20">
                <h3 class="text-label text-amber-400 mb-4">Market Structure</h3>
                <div id="price-action-text" class="text-lg font-black text-slate-100 mb-3 tracking-tight leading-none">---</div>
                <div id="breaker-block" class="bg-black/30 p-2.5 rounded-lg border border-slate-800 text-[10px] text-slate-400 flex justify-between items-center font-medium">
                    </div>
            </div>
        </div>

        <div id="verdict-card" class="wintrack-card p-6 border-l-[8px] bg-gradient-to-b from-[#111827] to-[#0f172a] shadow-2xl">
            <div class="space-y-6">
                <div>
                    <div class="flex items-center gap-3 mb-2">
                        <div id="signal-dot" class="w-3 h-3 rounded-full bg-slate-600"></div>
                        <h2 id="strat-text" class="text-lg font-black tracking-tighter uppercase text-slate-500">Analysing...</h2>
                    </div>
                    <p id="verdict-text" class="text-slate-400 leading-snug text-sm italic font-medium"></p>
                </div>
                
                <div class="bg-black/40 p-4 rounded-xl border border-white/5">
                    <div class="flex justify-between items-end mb-3">
                        <div>
                            <span class="text-label block mb-1">DCA Trust Score</span>
                            <span id="score-number" class="value-mono text-4xl font-black text-slate-600 leading-none">--</span>
                        </div>
                        <div class="text-right">
                            <span id="score-context" class="text-label block italic opacity-50">---</span>
                        </div>
                    </div>
                    <div class="h-2 bg-slate-800 rounded-full overflow-hidden p-0.5">
                        <div id="score-bar" class="h-full bg-slate-700 rounded-full transition-all duration-1000 ease-out shadow-[0_0_15px_rgba(255,255,255,0.05)]" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <footer class="text-center py-4 opacity-30">
            <p class="text-[9px] font-black tracking-[0.4em] uppercase">WinTrack 2026 • Discipline is Strength</p>
        </footer>
    </div>

    <script>
        const calculateEMA = (ps, p) => ps.length < p ? ps[ps.length - 1] : ps.slice(p).reduce((e, v) => (v * (2 / (p + 1))) + (e * (1 - (2 / (p + 1)))), ps.slice(0, p).reduce((a, b) => a + b, 0) / p);
        
        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            const changes = prices.slice(1).map((p, i) => p - prices[i]);
            let gain = 0, loss = 0;
            for (let i = 0; i < period; i++) changes[i] > 0 ? gain += changes[i] : loss -= changes[i];
            gain /= period; loss /= period;
            for (let i = period; i < changes.length; i++) {
                gain = (gain * (period - 1) + (changes[i] > 0 ? changes[i] : 0)) / period;
                loss = (loss * (period - 1) + (changes[i] < 0 ? -changes[i] : 0)) / period;
            }
            return 100 - (100 / (1 + gain / (loss || 0.0001)));
        }

        async function updateData() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=300');
                const data = await res.json();
                const closes = data.map(c => parseFloat(c[4]));
                const price = closes[closes.length - 1];
                const ema200 = calculateEMA(closes, 200);
                const rsi = calculateRSI(closes);

                document.getElementById('current-price').textContent = price.toLocaleString('en-US');

                document.getElementById('onchain-status').textContent = "TECHNICAL ONLY";
                document.getElementById('onchain-grid').innerHTML = `
                    <div class="bg-black/20 p-2.5 rounded-lg border border-slate-800 text-center"><p class="text-label text-[8px] mb-1">MVRV Z</p><p class="text-xl font-black value-mono text-white italic">0.80</p></div>
                    <div class="bg-black/20 p-2.5 rounded-lg border border-slate-800 text-center"><p class="text-label text-[8px] mb-1">Puell</p><p class="text-xl font-black value-mono text-white italic">0.78</p></div>
                `;

                document.getElementById('price-action-text').textContent = price > ema200 ? "📈 Uptrend Structure" : "📉 Correction Phase";
                const support = Math.round(ema200 * 0.965);
                document.getElementById('breaker-block').innerHTML = `<span>DCA Zone:</span><span class="text-emerald-400 font-black value-mono">$${support.toLocaleString()}</span>`;

                let score = 58;
                if (rsi < 45) score += 15;
                if (rsi < 35) score += 12;
                if (price <= ema200 * 1.06) score += 18;
                const finalScore = Math.min(100, Math.round(score + 15));

                const strat = document.getElementById('strat-text');
                const verdict = document.getElementById('verdict-text');
                const dot = document.getElementById('signal-dot');
                const card = document.getElementById('verdict-card');
                const sBar = document.getElementById('score-bar');
                const sNum = document.getElementById('score-number');

                sNum.textContent = finalScore;
                sBar.style.width = finalScore + "%";
                document.getElementById('score-context').textContent = "Tech + Chain Fallback";

                if (finalScore >= 90) {
                    strat.textContent = "🔥 DCA LỚN - ĐÁY MẠNH";
                    strat.className = "text-lg font-black text-emerald-400 tracking-tighter uppercase italic";
                    verdict.textContent = "Cơ hội vàng! Định giá chu kỳ cực thấp. Giải ngân 15-25% vốn.";
                    dot.className = "w-3 h-3 rounded-full bg-emerald-500 signal-dot";
                    card.style.borderLeftColor = "#10b981";
                    sBar.className = "h-full bg-emerald-500 transition-all duration-1000 shadow-[0_0_10px_rgba(16,185,129,0.5)]";
                    sNum.className = "value-mono text-4xl font-black text-emerald-500 italic";
                } else if (finalScore >= 82) {
                    strat.textContent = "✅ VÙNG MUA TỐT - DCA";
                    strat.className = "text-lg font-black text-cyan-400 tracking-tighter uppercase italic";
                    verdict.textContent = "Thị trường đang rẻ. Phù hợp tích lũy dần 8-15% vốn theo kế hoạch.";
                    dot.className = "w-3 h-3 rounded-full bg-cyan-400 signal-dot";
                    card.style.borderLeftColor = "#22d3ee";
                    sBar.className = "h-full bg-cyan-400 transition-all duration-1000 shadow-[0_0_10px_rgba(34,211,238,0.5)]";
                    sNum.className = "value-mono text-4xl font-black text-cyan-400 italic";
                } else if (finalScore >= 70) {
                    strat.textContent = "⏳ QUAN SÁT - CHỜ DIP";
                    strat.className = "text-lg font-black text-sky-400 tracking-tighter uppercase italic";
                    verdict.textContent = "Giá chưa đạt mức chiết khấu lý tưởng. Kiên nhẫn chờ dip sâu hơn.";
                    dot.className = "w-3 h-3 rounded-full bg-sky-400 shadow-md";
                    card.style.borderLeftColor = "#38bdf8";
                    sBar.className = "h-full bg-sky-500 transition-all duration-1000";
                    sNum.className = "value-mono text-4xl font-black text-sky-400 italic";
                } else {
                    strat.textContent = "⚠️ CẢNH BÁO - TRÁNH";
                    strat.className = "text-lg font-black text-red-500 tracking-tighter uppercase italic";
                    verdict.textContent = "Rủi ro cao hoặc On-chain quá nhiệt. Tuyệt đối không FOMO tại đây.";
                    dot.className = "w-3 h-3 rounded-full bg-red-500 shadow-md";
                    card.style.borderLeftColor = "#ef4444";
                    sBar.className = "h-full bg-red-500 transition-all duration-1000";
                    sNum.className = "value-mono text-4xl font-black text-red-500 italic";
                }

                document.getElementById('last-updated').textContent = `Live: ${new Date().toLocaleTimeString('vi-VN')} · v2.6`;
            } catch (e) {
                document.getElementById('last-updated').textContent = "Connection Error";
            }
        }

        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
