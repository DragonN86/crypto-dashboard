<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTrack 2026 - BTC D1 Elite v3.9.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body {
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
            color: white;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        .card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
        }
        .inner-box {
            background: #1a2333;
            border-radius: 16px;
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: all 0.3s ease;
        }
        .inner-box:hover {
            border-color: rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }
        .text-label {
            font-size: 0.65rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #64748b;
        }
        .value-mono {
            font-family: 'ui-monospace', monospace;
        }
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .sync-pulse {
            animation: pulse-soft 2s infinite;
        }
        #score-bar {
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen flex items-center justify-center">
    <div class="max-w-xl w-full space-y-5">
        
        <!-- Header -->
        <div class="flex justify-between items-end px-1">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-blue-900/30">📈</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">BTC SPOT <span class="text-cyan-400">D1 ELITE</span></h1>
                    <p id="last-updated" class="text-[10px] text-slate-500 font-bold mt-1 uppercase tracking-widest sync-pulse">Đang kết nối WebSocket...</p>
                </div>
            </div>
            <div class="text-right">
                <div id="current-price" class="text-4xl font-black text-emerald-400 value-mono leading-none">---,---</div>
                <div class="text-[10px] text-emerald-500 font-black mt-1 tracking-widest uppercase">LIVE • Binance</div>
            </div>
        </div>

        <!-- On-Chain + Volume Real-time -->
        <div class="card p-5">
            <h3 class="text-label text-purple-400 mb-4 text-center">On-Chain Proxy & Volume Real-time</h3>
            <div class="grid grid-cols-4 gap-3">
                <div class="inner-box text-center">
                    <p class="text-label">MVRV Proxy</p>
                    <p id="mvrv" class="text-2xl font-black mt-1 value-mono">--</p>
                </div>
                <div class="inner-box text-center">
                    <p class="text-label">Puell Proxy</p>
                    <p id="puell" class="text-2xl font-black mt-1 value-mono">--</p>
                </div>
                <div class="inner-box text-center">
                    <p class="text-label">24h Vol</p>
                    <p id="volume-24h" class="text-2xl font-black mt-1 value-mono text-sky-400">--</p>
                </div>
                <div id="regime-card" class="inner-box text-center flex flex-col justify-center border transition-all duration-500"></div>
            </div>
        </div>

        <!-- Technical Metrics -->
        <div class="card p-5">
            <div id="metrics-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 text-[11px] font-bold"></div>
           
            <div class="grid grid-cols-3 gap-3 mt-5">
                <div class="inner-box text-center">
                    <p class="text-label text-pink-400">Fear & Greed</p>
                    <p id="fear-greed" class="text-3xl font-black mt-1">--</p>
                    <p id="fear-label" class="text-[10px] font-bold uppercase text-slate-500 mt-1"></p>
                </div>
                <div class="inner-box text-center">
                    <p class="text-label text-sky-400">Vol Ratio</p>
                    <p id="vol-ratio-val" class="text-3xl font-black mt-1">--x</p>
                </div>
                <div id="whale-card" class="inner-box text-center flex flex-col justify-center"></div>
            </div>
        </div>

        <!-- Verdict + Dynamic DCA -->
        <div id="verdict-card" class="card p-6 border-l-8 transition-all duration-500 relative overflow-hidden">
            <div class="flex items-center justify-between mb-4 relative z-10">
                <div class="flex items-center gap-3">
                    <div id="signal-dot" class="w-10 h-10 rounded-xl flex items-center justify-center text-2xl bg-slate-800">⏳</div>
                    <h2 id="strat-text" class="text-xl font-black uppercase tracking-tighter">Phân tích hệ thống...</h2>
                </div>
                <div class="text-right">
                    <span class="text-label block">DCA Score</span>
                    <span id="score-number" class="text-4xl font-black value-mono leading-none">--</span>
                </div>
            </div>
            <p id="verdict-text" class="text-slate-400 text-sm leading-relaxed font-medium mb-5 italic relative z-10">Đang tổng hợp dữ liệu...</p>
            <div class="h-2 bg-slate-800 rounded-full overflow-hidden relative z-10">
                <div id="score-bar" class="h-full rounded-full bg-slate-600 w-0"></div>
            </div>

            <!-- Dynamic DCA Suggestion -->
            <div class="mt-6 pt-4 border-t border-slate-700">
                <p class="text-label mb-2">GỢI Ý DCA ĐỘNG</p>
                <div id="dca-suggestion" class="text-3xl font-black value-mono text-emerald-400">--</div>
                <p id="dca-advice" class="text-sm text-slate-400 mt-1"></p>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const fmt = val => new Intl.NumberFormat('en-US').format(Math.round(val));

        let ws = null;
        let lastPrice = 0;
        let historicalData = [];
        let lastVolume24h = 0;

        function calculateEMA(prices, period) {
            if (!prices || prices.length < period) return prices[prices.length - 1] || 0;
            let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
            const k = 2 / (period + 1);
            for (let i = period; i < prices.length; i++) {
                ema = prices[i] * k + ema * (1 - k);
            }
            return ema;
        }

        function calculateRSI(prices, period = 14) {
            if (!prices || prices.length < period + 1) return 50;
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const diff = prices[i] - prices[i - 1];
                if (diff > 0) gains += diff; else losses -= diff;
            }
            let avgGain = gains / period;
            let avgLoss = losses / period || 0.001;
            for (let i = period + 1; i < prices.length; i++) {
                const diff = prices[i] - prices[i - 1];
                avgGain = (avgGain * (period - 1) + Math.max(diff, 0)) / period;
                avgLoss = (avgLoss * (period - 1) + Math.max(-diff, 0)) / period;
            }
            return Math.round(100 - (100 / (1 + avgGain / avgLoss)));
        }

        async function fetchHistoricalData() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=365');
                const data = await res.json();
                historicalData = data.map(d => parseFloat(d[4]));
            } catch (e) {
                console.error(e);
            }
        }

        async function fetchFearGreed() {
            try {
                const res = await fetch('https://api.alternative.me/fng/?limit=1');
                const data = await res.json();
                return data.data[0];
            } catch (e) {
                return { value: 50, value_classification: "Neutral" };
            }
        }

        function updateUI(price) {
            const prevPrice = lastPrice || price;
            lastPrice = price;
            $('current-price').textContent = fmt(price);
            $('current-price').className = `text-4xl font-black value-mono leading-none ${price >= prevPrice ? 'text-emerald-400' : 'text-rose-400'}`;
            document.title = `$${fmt(price)} | BTC D1 Elite`;
        }

        async function updateAnalytics() {
            if (historicalData.length === 0) return;

            const price = lastPrice || historicalData[historicalData.length - 1];
            const ema200 = calculateEMA(historicalData, 200);
            const rsi = calculateRSI(historicalData);
            const fgData = await fetchFearGreed();
            const fg = parseInt(fgData.value);
            const mvrv = price / ema200;
            const deviation = (price - ema200) / ema200 * 100;
            const isUptrend = price > ema200 * 0.985;

            // DCA Score
            let score = 50;
            if (mvrv < 0.85) score += 25;
            else if (mvrv < 0.95) score += 18;
            else if (mvrv > 1.35) score -= 22;

            if (rsi < 32) score += 22;
            else if (rsi < 40) score += 12;
            else if (rsi > 72) score -= 20;

            if (fg < 25) score += 20;
            else if (fg < 40) score += 10;
            else if (fg > 75) score -= 18;

            if (deviation < -18) score += 15;
            else if (deviation < -8) score += 8;
            else if (deviation > 35) score -= 12;

            const volScore = lastVolume24h > 80000 ? 12 : lastVolume24h > 50000 ? 6 : 0;
            score += volScore;

            const puellProxy = Math.max(0.3, Math.min(4.5, (1 / mvrv) * (lastVolume24h > 60000 ? 0.8 : 1.2))).toFixed(2);

            score = Math.max(5, Math.min(98, Math.round(score)));

            // Update UI
            $('mvrv').textContent = mvrv.toFixed(2) + "x";
            $('puell').textContent = puellProxy;
            $('vol-ratio-val').textContent = (lastVolume24h / 100000).toFixed(1) + "x";

            // Regime
            const regimeEl = $('regime-card');
            regimeEl.className = `inner-box text-center flex flex-col justify-center border transition-all duration-500 ${isUptrend ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-rose-500/10 border-rose-500/30 text-rose-400'}`;
            regimeEl.innerHTML = `<p class="text-label">Regime</p><p class="text-[10px] font-black mt-1 uppercase">${isUptrend ? 'BULLISH PHASE' : 'BEARISH/ACCUM'}</p>`;

            // Whale Alert
            const whaleCard = $('whale-card');
            if (lastVolume24h > 80000) {
                whaleCard.innerHTML = `<p class="text-label text-orange-400">🐳 Whale Alert</p><p class="text-[10px] font-black mt-1 text-orange-400 uppercase">High Volume</p>`;
                whaleCard.classList.add('bg-orange-500/10', 'border-orange-500/30');
            } else {
                whaleCard.innerHTML = `<p class="text-label text-slate-500">Whale Activity</p><p class="text-[10px] font-black mt-1 uppercase text-slate-400">Normal</p>`;
                whaleCard.classList.remove('bg-orange-500/10', 'border-orange-500/30');
            }

            // Fear & Greed
            $('fear-greed').textContent = fg;
            $('fear-label').textContent = fgData.value_classification;
            $('fear-greed').className = `text-3xl font-black mt-1 ${fg < 35 ? 'text-emerald-400' : fg > 65 ? 'text-rose-400' : 'text-amber-400'}`;

            // Verdict
            const vCard = $('verdict-card');
            const sDot = $('signal-dot');
            if (score >= 78) {
                vCard.style.borderLeftColor = "#10b981";
                $('strat-text').textContent = "CƠ HỘI GOM HÀNG MẠNH";
                $('verdict-text').textContent = "Chiết khấu sâu + Volume cao + Fear mạnh.";
                sDot.innerHTML = "💎"; sDot.className = "w-10 h-10 rounded-xl flex items-center justify-center text-2xl bg-emerald-500/20";
                $('score-bar').className = "h-full bg-emerald-500";
            } else if (score >= 65) {
                vCard.style.borderLeftColor = "#34d399";
                $('strat-text').textContent = "CƠ HỘI TÍCH LŨY TỐT";
                $('verdict-text').textContent = "Nên DCA đều + tăng tỷ trọng.";
                sDot.innerHTML = "📈"; sDot.className = "w-10 h-10 rounded-xl flex items-center justify-center text-2xl bg-emerald-400/20";
                $('score-bar').className = "h-full bg-emerald-400";
            } else if (score <= 35) {
                vCard.style.borderLeftColor = "#f43f5e";
                $('strat-text').textContent = "CẢNH BÁO QUÁ NHIỆT";
                $('verdict-text').textContent = "Thị trường hưng phấn. Giảm DCA hoặc chờ dip.";
                sDot.innerHTML = "🔥"; sDot.className = "w-10 h-10 rounded-xl flex items-center justify-center text-2xl bg-rose-500/20";
                $('score-bar').className = "h-full bg-rose-500";
            } else {
                vCard.style.borderLeftColor = "#3b82f6";
                $('strat-text').textContent = "CHẾ ĐỘ THEO DÕI";
                $('verdict-text').textContent = "Thị trường trung tính. DCA cơ bản là ổn.";
                sDot.innerHTML = "⏳"; sDot.className = "w-10 h-10 rounded-xl flex items-center justify-center text-2xl bg-blue-500/20";
                $('score-bar').className = "h-full bg-blue-500";
            }

            $('score-number').textContent = score;
            $('score-bar').style.width = score + "%";

            // Dynamic DCA
            let dcaPercent = 2;
            if (score >= 85) dcaPercent = 15;
            else if (score >= 78) dcaPercent = 12;
            else if (score >= 70) dcaPercent = 8;
            else if (score >= 60) dcaPercent = 5;
            else if (score <= 40) dcaPercent = 0.5;

            $('dca-suggestion').textContent = `${dcaPercent}% VỐN`;
            $('dca-suggestion').className = `text-3xl font-black value-mono ${dcaPercent >= 10 ? 'text-emerald-400' : dcaPercent >= 5 ? 'text-sky-400' : 'text-slate-400'}`;

            const adviceEl = $('dca-advice');
            if (dcaPercent >= 12) adviceEl.textContent = "Tăng mạnh tỷ trọng ngay. Cơ hội cực tốt.";
            else if (dcaPercent >= 5) adviceEl.textContent = "DCA đều đặn, có thể tăng nhẹ.";
            else if (dcaPercent <= 1) {
                adviceEl.textContent = "Giảm hoặc tạm dừng DCA. Chờ tín hiệu rõ hơn.";
                adviceEl.className = "text-sm text-rose-400 mt-1";
            } else adviceEl.textContent = "DCA cơ bản là ổn.";

            $('last-updated').textContent = `Live • ${new Date().toLocaleTimeString('vi-VN')} • v3.9.1`;
        }

        function connectWebSocket() {
            ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
            ws.onopen = () => console.log("✅ WebSocket Connected");
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const price = parseFloat(data.c);
                lastVolume24h = parseFloat(data.v);
                updateUI(price);
            };
            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        async function init() {
            await fetchHistoricalData();
            connectWebSocket();
            await updateAnalytics();
            setInterval(updateAnalytics, 60000);
        }

        init();
    </script>
</body>
</html>
