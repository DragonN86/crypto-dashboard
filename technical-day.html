<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTrack 2026 - BTC D1 Elite v3.9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background: #0a0a0f; font-family: 'Inter', sans-serif; color: white; overflow-x: hidden; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.4); }
        .inner-box { background: #1a2333; border-radius: 16px; padding: 12px 14px; border: 1px solid rgba(255,255,255,0.03); transition: all 0.3s ease; }
        .inner-box:hover { border-color: rgba(255,255,255,0.1); transform: translateY(-1px); }
        .text-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: #64748b; }
        .value-mono { font-family: 'ui-monospace', monospace; }
        @keyframes pulse-soft { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
        .sync-pulse { animation: pulse-soft 2s infinite; }
        #score-bar { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen flex items-center justify-center">
    <div class="max-w-xl w-full space-y-5">
        <!-- Header -->
        <div class="flex justify-between items-end px-1">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-gradient-to-br from-cyan-400 to-blue-600 rounded-2xl flex items-center justify-center text-2xl shadow-lg shadow-blue-900/30">📈</div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter uppercase leading-none">BTC SPOT <span class="text-cyan-400">D1 ELITE</span></h1>
                    <p id="last-updated" class="text-[10px] text-slate-500 font-bold mt-1 uppercase tracking-widest sync-pulse">Đang kết nối...</p>
                </div>
            </div>
            <div class="text-right">
                <div id="current-price" class="text-4xl font-black text-emerald-400 value-mono leading-none">---,---</div>
                <div class="text-[10px] text-emerald-500 font-black mt-1 tracking-widest uppercase">LIVE • Binance</div>
            </div>
        </div>

        <!-- On-Chain + Volume -->
        <div class="card p-5">
            <h3 class="text-label text-purple-400 mb-4 text-center">On-Chain Proxy & Volume Real-time</h3>
            <div class="grid grid-cols-4 gap-3">
                <div class="inner-box text-center">
                    <p class="text-label">MVRV Proxy</p>
                    <p id="mvrv" class="text-2xl font-black mt-1 value-mono">--</p>
                </div>
                <div class="inner-box text-center">
                    <p class="text-label">Puell Proxy</p>
                    <p id="puell" class="text-2xl font-black mt-1 value-mono">--</p>
                </div>
                <div class="inner-box text-center">
                    <p class="text-label">24h Vol</p>
                    <p id="volume-24h" class="text-2xl font-black mt-1 value-mono text-sky-400">--</p>
                </div>
                <div id="regime-card" class="inner-box text-center flex flex-col justify-center border transition-all duration-500"></div>
            </div>
        </div>

        <!-- Các phần cũ giữ nguyên (Metrics, Fear & Greed, DCA Zones) -->
        <!-- ... (giữ nguyên như code trước) ... -->

        <!-- Verdict + Dynamic DCA -->
        <div id="verdict-card" class="card p-6 border-l-8 transition-all duration-500 relative overflow-hidden">
            <!-- ... (giữ nguyên) ... -->
            <div class="mt-6 pt-4 border-t border-slate-700">
                <p class="text-label mb-2">GỢI Ý DCA ĐỘNG</p>
                <div id="dca-suggestion" class="text-2xl font-black value-mono text-emerald-400"></div>
                <p id="dca-advice" class="text-sm text-slate-400 mt-1"></p>
            </div>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);
        const fmt = val => new Intl.NumberFormat('en-US').format(Math.round(val));

        let ws = null;
        let lastPrice = 0;
        let historicalData = [];
        let lastVolume24h = 0;

        // ... (giữ nguyên calculateEMA, calculateRSI, fetchHistoricalData, fetchFearGreed, updateUI) ...

        function connectWebSocket() {
            ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');

            ws.onopen = () => console.log("✅ WebSocket Connected");
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const price = parseFloat(data.c);
                lastVolume24h = parseFloat(data.v); // Volume base (BTC) 24h

                updateUI(price);
                $('volume-24h').textContent = (lastVolume24h / 1000).toFixed(1) + "k BTC";
            };

            ws.onclose = () => setTimeout(connectWebSocket, 3000);
        }

        async function updateAnalytics() {
            if (historicalData.length === 0) return;

            const price = lastPrice || historicalData[historicalData.length - 1];
            const ema200 = calculateEMA(historicalData, 200);
            const rsi = calculateRSI(historicalData);
            const fgData = await fetchFearGreed();
            const fg = parseInt(fgData.value);
            const mvrv = price / ema200;
            const deviation = (price - ema200) / ema200 * 100;
            const isUptrend = price > ema200 * 0.985;

            // ==================== DCA SCORE TỐI ƯU + VOLUME + PUELL ====================
            let score = 50;

            // MVRV
            if (mvrv < 0.85) score += 25; else if (mvrv < 0.95) score += 18; else if (mvrv > 1.35) score -= 22;

            // RSI
            if (rsi < 32) score += 22; else if (rsi < 40) score += 12; else if (rsi > 72) score -= 20;

            // Fear & Greed
            if (fg < 25) score += 20; else if (fg < 40) score += 10; else if (fg > 75) score -= 18;

            // Deviation
            if (deviation < -18) score += 15; else if (deviation < -8) score += 8; else if (deviation > 35) score -= 12;

            // Volume Real-time (High volume khi dip = tín hiệu mạnh)
            const volScore = lastVolume24h > 80000 ? 12 : lastVolume24h > 50000 ? 6 : 0;
            score += volScore;

            // Puell Proxy (cải tiến)
            const puellProxy = Math.max(0.3, Math.min(4.5, (1 / mvrv) * (lastVolume24h > 60000 ? 0.8 : 1.2))).toFixed(2);
            $('puell').textContent = puellProxy;

            score = Math.max(5, Math.min(98, Math.round(score)));

            // ... (giữ nguyên verdict logic với ngưỡng 78 / 65 / 35) ...

            // ==================== DYNAMIC DCA AMOUNT ====================
            let dcaPercent = 2; // base
            if (score >= 85) dcaPercent = 15;
            else if (score >= 78) dcaPercent = 12;
            else if (score >= 70) dcaPercent = 8;
            else if (score >= 60) dcaPercent = 5;
            else if (score <= 40) dcaPercent = 0.5;

            $('dca-suggestion').textContent = `${dcaPercent}% VỐN`;
            $('dca-suggestion').className = `text-2xl font-black value-mono ${dcaPercent >= 10 ? 'text-emerald-400' : dcaPercent >= 5 ? 'text-sky-400' : 'text-slate-400'}`;

            const adviceEl = $('dca-advice');
            if (dcaPercent >= 12) {
                adviceEl.textContent = "Tăng mạnh tỷ trọng ngay. Cơ hội cực tốt.";
                adviceEl.className = "text-sm text-emerald-400 mt-1";
            } else if (dcaPercent >= 5) {
                adviceEl.textContent = "DCA đều đặn, có thể tăng nhẹ.";
            } else if (dcaPercent <= 1) {
                adviceEl.textContent = "Giảm hoặc tạm dừng DCA. Chờ tín hiệu rõ hơn.";
                adviceEl.className = "text-sm text-rose-400 mt-1";
            } else {
                adviceEl.textContent = "DCA cơ bản là ổn.";
            }

            $('last-updated').textContent = `Live • ${new Date().toLocaleTimeString('vi-VN')} • v3.9.0`;
        }

        async function init() {
            await fetchHistoricalData();
            connectWebSocket();
            await updateAnalytics();
            setInterval(updateAnalytics, 60000);
        }

        init();
    </script>
</body>
</html>
