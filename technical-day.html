<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC WinTrack 2026 - Realtime Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');
        body { background: #030712; font-family: 'Inter', sans-serif; color: white; }
        .wintrack-card { background: #111827; border: 1px solid #1f2937; border-radius: 20px; transition: all 0.3s ease; }
        .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3); }
        .signal-dot { animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; }
        @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600/20 rounded-2xl flex items-center justify-center text-3xl shadow-inner">📊</div>
                <div>
                    <h1 class="text-white font-black text-3xl tracking-tighter">BTC SPOT <span class="text-blue-500 text-xl ml-1">D1</span></h1>
                    <p id="last-updated" class="text-slate-500 text-xs font-mono uppercase tracking-widest mt-1">Đang khởi tạo kết nối...</p>
                </div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-2xl border border-slate-800 backdrop-blur-sm min-w-[200px]">
                <p class="text-slate-400 text-[10px] uppercase font-bold mb-1 tracking-widest">Giá Realtime (Binance)</p>
                <div id="current-price" class="font-mono text-4xl font-bold text-emerald-400">---,---</div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
            <div class="wintrack-card p-6 hover-lift">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-purple-400 font-bold text-xs tracking-widest uppercase">Dữ liệu On-chain</h3>
                    <span id="onchain-status" class="text-[10px] px-2 py-0.5 rounded-full bg-slate-800 text-slate-500 font-bold uppercase">Checking...</span>
                </div>
                <div class="grid grid-cols-2 gap-6" id="onchain-grid"></div>
            </div>

            <div class="wintrack-card p-6 hover-lift">
                <h3 class="text-amber-400 font-bold text-xs tracking-widest uppercase mb-4">Cấu trúc thị trường (D1)</h3>
                <div id="price-action-text" class="text-lg font-bold text-slate-300 mb-2"></div>
                <div id="breaker-block" class="text-xs bg-black/30 p-3 rounded-xl border border-slate-800 text-slate-400"></div>
            </div>
        </div>

        <div id="verdict-card" class="wintrack-card p-8 hover-lift border-l-8 border-l-slate-700">
            <div class="flex flex-col md:flex-row justify-between gap-6">
                <div class="flex-1">
                    <div class="flex items-center gap-3 mb-4">
                        <div id="signal-dot" class="w-4 h-4 rounded-full bg-slate-600"></div>
                        <h2 id="strat-text" class="text-2xl font-black tracking-tighter uppercase text-slate-500">Hệ thống đang tính...</h2>
                    </div>
                    <p id="verdict-text" class="text-slate-400 leading-relaxed text-lg italic"></p>
                </div>
                
                <div class="md:w-64">
                    <div class="flex justify-between items-baseline mb-2">
                        <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">DCA Trust Score</span>
                        <span id="score-number" class="font-mono text-4xl font-bold text-slate-600">--</span>
                    </div>
                    <div class="h-4 bg-black/40 rounded-full overflow-hidden p-1 shadow-inner border border-slate-800">
                        <div id="score-bar" class="h-full bg-slate-700 rounded-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <p id="score-context" class="text-[9px] text-slate-600 mt-3 uppercase text-right leading-tight font-medium"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calculateEMA(prices, period) {
            if (prices.length < period) return prices[prices.length - 1];
            let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;
            const k = 2 / (period + 1);
            for (let i = period; i < prices.length; i++) {
                ema = (prices[i] * k) + (ema * (1 - k));
            }
            return ema;
        }

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            const changes = prices.slice(1).map((p, i) => p - prices[i]);
            let avgGain = 0, avgLoss = 0;
            for (let i = 0; i < period; i++) {
                if (changes[i] > 0) avgGain += changes[i];
                else avgLoss -= changes[i];
            }
            avgGain /= period; avgLoss /= period;
            for (let i = period; i < changes.length; i++) {
                const gain = changes[i] > 0 ? changes[i] : 0;
                const loss = changes[i] < 0 ? -changes[i] : 0;
                avgGain = (avgGain * (period - 1) + gain) / period;
                avgLoss = (avgLoss * (period - 1) + loss) / period;
            }
            return avgLoss === 0 ? 100 : Math.min(100, Math.max(0, 100 - (100 / (1 + avgGain / avgLoss))));
        }

        async function fetchOnChain() {
            try {
                const [mRes, pRes] = await Promise.all([
                    fetch('https://api.bitcoin-data.com/v1/mvrv-zscore'),
                    fetch('https://api.bitcoin-data.com/v1/puell-multiple')
                ]);
                const mData = await mRes.json();
                const pData = await pRes.json();
                return {
                    mvrv: parseFloat(mData[mData.length-1].value) || 0.80,
                    puell: parseFloat(pData[pData.length-1].value) || 0.76,
                    status: 'online'
                };
            } catch (e) {
                return { mvrv: 0.80, puell: 0.76, status: 'offline' };
            }
        }

        async function updateData() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1d&limit=300');
                const data = await res.json();
                const closes = data.map(c => parseFloat(c[4]));
                const price = closes[closes.length - 1];
                const ema200 = calculateEMA(closes, 200);
                const rsi = calculateRSI(closes);

                document.getElementById('current-price').textContent = price.toLocaleString('en-US');

                const oc = await fetchOnChain();
                const statusEl = document.getElementById('onchain-status');
                const gridEl = document.getElementById('onchain-grid');

                let onchainBonus = 10;
                let isOnline = oc.status === 'online';

                if (isOnline) {
                    statusEl.textContent = "LIVE ON-CHAIN";
                    statusEl.className = "text-[10px] px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-400 font-bold uppercase";
                    gridEl.innerHTML = `
                        <div><p class="text-slate-400 text-xs">MVRV Z-Score</p><p class="text-3xl font-bold text-emerald-400">${oc.mvrv.toFixed(2)}</p></div>
                        <div><p class="text-slate-400 text-xs">Puell Multiple</p><p class="text-3xl font-bold text-emerald-400">${oc.puell.toFixed(2)}</p></div>
                    `;
                    if (oc.mvrv <= 1.0 && oc.puell <= 1.0) onchainBonus = 25;
                    else if (oc.mvrv < 1.5) onchainBonus = 15;
                } else {
                    statusEl.textContent = "TECHNICAL ONLY";
                    statusEl.className = "text-[10px] px-2 py-0.5 rounded-full bg-amber-500/20 text-amber-400 font-bold uppercase";
                    gridEl.innerHTML = `<div class="col-span-2 text-center text-slate-400 text-sm">On-chain tạm thời không khả dụng</div>`;
                }

                // Price Action
                document.getElementById('price-action-text').innerHTML = price > ema200 
                    ? `📈 Cấu trúc tăng mạnh (Higher High & Higher Low)` 
                    : `📉 Cấu trúc điều chỉnh`;
                document.getElementById('breaker-block').innerHTML = `🔥 Vùng hỗ trợ chính: <span class="text-emerald-400">$${ (ema200 * 1.02).toLocaleString() }</span>`;

                // Score
                let score = 55;
                if (rsi < 45) score += 15;
                if (rsi < 35) score += 12;
                if (price <= ema200 * 1.05) score += 18;
                const finalScore = Math.min(100, Math.round(score + onchainBonus));

                // Update Score UI
                document.getElementById('score-number').textContent = finalScore;
                document.getElementById('score-bar').style.width = finalScore + "%";
                document.getElementById('score-context').textContent = isOnline ? "Kỹ thuật + On-chain" : "Chỉ kỹ thuật";

                // === VERDICT LOGIC (ĐÃ THÊM >=90) ===
                const strat = document.getElementById('strat-text');
                const verdict = document.getElementById('verdict-text');
                const dot = document.getElementById('signal-dot');
                const card = document.getElementById('verdict-card');

                if (finalScore >= 90) {
                    strat.textContent = "🔥 VÙNG ĐÁY MẠNH - DCA LỚN";
                    strat.className = "text-2xl font-black text-emerald-400 tracking-tighter uppercase";
                    verdict.textContent = "Mọi chỉ số hội tụ cực mạnh. Đây là cơ hội tích lũy vàng dài hạn. Nên DCA mạnh 15-25% vốn.";
                    dot.className = "w-4 h-4 rounded-full bg-emerald-500 signal-dot";
                    card.style.borderLeftColor = "#10b981";
                } else if (finalScore >= 82) {
                    strat.textContent = "✅ VÙNG MUA TỐT - DCA";
                    strat.className = "text-2xl font-black text-cyan-400 tracking-tighter uppercase";
                    verdict.textContent = "Thị trường đang rẻ. Phù hợp DCA dần 8-15% vốn.";
                    dot.className = "w-4 h-4 rounded-full bg-cyan-400 signal-dot";
                    card.style.borderLeftColor = "#22d3ee";
                } else if (finalScore >= 70) {
                    strat.textContent = "⏳ QUAN SÁT - CHỜ DIP";
                    strat.className = "text-2xl font-black text-sky-400 tracking-tighter uppercase";
                    verdict.textContent = "Chưa đủ hấp dẫn để vào lớn. Nên chờ dip sâu hơn hoặc mua thăm dò.";
                    dot.className = "w-4 h-4 rounded-full bg-sky-400";
                    card.style.borderLeftColor = "#38bdf8";
                } else {
                    strat.textContent = "⚠️ CẢNH BÁO - TRÁNH";
                    strat.className = "text-2xl font-black text-red-400 tracking-tighter uppercase";
                    verdict.textContent = "Rủi ro cao. Không nên vào mới lúc này.";
                    dot.className = "w-4 h-4 rounded-full bg-red-400";
                    card.style.borderLeftColor = "#f87171";
                }

                document.getElementById('last-updated').textContent = `Cập nhật: ${new Date().toLocaleTimeString('vi-VN')}`;
            } catch (e) {
                console.error(e);
                document.getElementById('last-updated').textContent = "Lỗi kết nối • Thử lại sau";
            }
        }

        updateData();
        setInterval(updateData, 60000);
    </script>
</body>
</html>
