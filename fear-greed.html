<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <style>
    body, html {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #0d1117; /* Khớp màu index */
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .container {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 10px;
      box-sizing: border-box;
    }
    img {
      max-width: 100%;
      max-height: 90%; /* Ép ảnh thu nhỏ lại */
      object-fit: contain;
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
    }
    .text {
      color: #8b949e; font-family: sans-serif;
      font-size: 11px; margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://alternative.me/crypto/fear-and-greed-index.png">
    <div class="text">TÂM LÝ THỊ TRƯỜNG REAL-TIME</div>
    <div class="status-text">
        <span class="safe">0-20: Mua</span> | <span class="danger">80-100: Thoát hàng</span>
    </div>
  </div>
</body>
</html>
