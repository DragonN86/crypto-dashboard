<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fear & Greed Index</title>
  <style>
    /* 1. Thiết lập nền tối đồng bộ với Dashboard */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #0d1117; /* Màu nền GitHub Dark */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      overflow: hidden;
    }

    /* 2. Container khống chế kích thước */
    .container {
      width: 95%;
      height: 95%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #161b22;
      border-radius: 12px;
    }

    /* 3. Ép ảnh tự co giãn, không bao giờ to quá khổ */
    img {
      max-width: 100%;
      max-height: 75%; /* Dành chỗ cho phần text bên dưới */
      object-fit: contain;
      border-radius: 8px;
    }

    /* 4. Phần ghi chú nhỏ gọn bên dưới */
    .note {
      margin-top: 10px;
      color: #8b949e;
      font-size: 11px;
      text-align: center;
      line-height: 1.4;
      padding: 0 10px;
    }

    .highlight {
        color: #58a6ff;
        font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://alternative.me/crypto/fear-and-greed-index.png" alt="Fear & Greed Index">
    
    <div class="note">
        <span class="highlight">CÁCH XEM:</span> <br>
        Dưới 20: Sợ hãi tột độ (Cơ hội mua) <br>
        Trên 80: Tham lam tột độ (Cần <span style="color: #f85149;">THOÁT HÀNG</span>)
    </div>
  </div>
</body>
</html>
