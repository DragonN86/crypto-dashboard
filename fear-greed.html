<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Fear & Greed - WinTrack 2026</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0; padding: 0;
      background: #0d1117;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gauge-container {
      width: 100%;
      max-width: 280px;
      text-align: center;
    }
    .fear-value {
      font-size: 3.5rem;
      font-weight: 900;
      line-height: 1;
      font-family: monospace;
    }
  </style>
</head>
<body class="bg-[#0d1117]">

  <div class="gauge-container">
    <div class="text-[#f2cc60] text-xs tracking-widest font-bold mb-1">FEAR & GREED INDEX</div>
    
    <div id="fear-value" class="fear-value text-white">--</div>
    <div id="fear-label" class="text-sm font-bold mt-1"></div>

    <!-- Gauge Bar -->
    <div class="h-3 bg-gray-800 rounded-full mt-4 overflow-hidden">
      <div id="gauge-bar" class="h-full transition-all duration-1000 rounded-full"></div>
    </div>

    <div class="flex justify-between text-[10px] text-gray-500 mt-1">
      <span>0-20 MUA</span>
      <span>80-100 THOÁT</span>
    </div>

    <div id="last-updated" class="text-[10px] text-gray-600 mt-6"></div>
  </div>

  <script>
    let currentFear = 50;

    function getFearLabel(value) {
      if (value <= 20) return { label: "EXTREME FEAR", color: "#3fb950" };
      if (value <= 40) return { label: "FEAR", color: "#7ed66e" };
      if (value <= 60) return { label: "NEUTRAL", color: "#f2cc60" };
      if (value <= 80) return { label: "GREED", color: "#f8a13f" };
      return { label: "EXTREME GREED", color: "#f85149" };
    }

    async function fetchFearData() {
      try {
        const res = await fetch('https://api.alternative.me/fng/');
        const data = await res.json();
        const value = parseInt(data.data[0].value);
        const timestamp = data.data[0].timestamp;

        currentFear = value;

        const { label, color } = getFearLabel(value);

        // Cập nhật UI
        document.getElementById('fear-value').textContent = value;
        document.getElementById('fear-value').style.color = color;
        document.getElementById('fear-label').textContent = label;
        document.getElementById('fear-label').style.color = color;

        // Gauge
        const percent = Math.min(100, Math.max(0, value));
        document.getElementById('gauge-bar').style.width = percent + '%';
        document.getElementById('gauge-bar').style.background = color;

        document.getElementById('last-updated').textContent = 
          'Cập nhật: ' + new Date(timestamp * 1000).toLocaleString('vi-VN');

        // === GỬI DỮ LIỆU VỀ INDEX.HTML ===
        window.parent.postMessage({
          type: 'WINTRACK_UPDATE',
          fear: value,
          fearLabel: label
        }, "*");

        console.log(`✅ Fear & Greed updated: ${value} - ${label}`);

      } catch (err) {
        console.error("Lỗi Fear & Greed API:", err);
        document.getElementById('fear-value').textContent = "ERR";
      }
    }

    // Khởi chạy
    fetchFearData();
    setInterval(fetchFearData, 600000); // 10 phút/lần
  </script>
</body>
</html>
