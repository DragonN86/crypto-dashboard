<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vo Will - Fear & Greed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --card-light: #ffffff;
      --note-bg: #0d1b2a;
      --note-border: #1f6feb;
      --header-title: #7dd3fc;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(31, 111, 235, 0.12), transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 100%, rgba(125, 211, 252, 0.06), transparent 45%);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .wrap {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      padding: 0;
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 24px 48px -12px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 20px 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(22, 27, 34, 0.98) 0%, rgba(13, 17, 23, 0.4) 100%);
    }

    .section-head h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--header-title);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-head .badge {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(139, 148, 158, 0.12);
      border: 1px solid rgba(139, 148, 158, 0.2);
    }

    .card {
      margin: 20px;
      margin-top: 0;
      background: var(--card-light);
      border-radius: 16px;
      padding: 20px 20px 16px;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(0, 0, 0, 0.04);
    }

    .card img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card img:hover {
      transform: scale(1.015);
    }

    .note {
      margin: 0 20px 20px;
      text-align: left;
      font-size: 0.875rem;
      line-height: 1.6;
      color: #c9d1d9;
      border-left: 4px solid var(--note-border);
      padding: 14px 16px 14px 18px;
      background: var(--note-bg);
      border-radius: 0 12px 12px 0;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .note strong {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 8px;
    }

    .note p {
      margin: 0 0 10px;
      color: #adbac7;
    }

    .note p:last-child {
      margin-bottom: 0;
    }

    @media (max-width: 420px) {
      .section-head {
        flex-direction: column;
        align-items: flex-start;
      }

      .card {
        margin: 16px;
        margin-top: 0;
        padding: 16px;
      }

      .note {
        margin: 0 16px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="section-head">
      <h1><span aria-hidden="true">📊</span> 1. Tâm Lý Thị Trường</h1>
      <span class="badge" title="Chỉ báo tâm lý">Sentiment</span>
    </header>
    <div class="card">
      <img
        src="https://alternative.me/crypto/fear-and-greed-index.png"
        alt="Biểu đồ Fear and Greed Index — chỉ số tâm lý thị trường crypto">
    </div>
    <div class="note" role="note">
      <strong><span aria-hidden="true">💡</span> Cách xem</strong>
      <p>Chỉ số &gt; 80 là vùng rủi ro cao (tham lam tột độ).</p>
      <p>Khi kim sát mốc 100 là lúc nên cân nhắc &quot;thoát hàng&quot;.</p>
    </div>
  </div>
</body>
</html>
