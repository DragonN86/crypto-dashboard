<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Fear & Greed Data Source</title>
  <style>
    /* 1. Reset & Base Style */
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #0d1117; /* Màu nền tiệp với Dashboard */
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* 2. Container */
    .container {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 15px;
    }

    /* 3. Image Control */
    img {
      max-width: 100%;
      max-height: 75%; 
      object-fit: contain;
      filter: drop-shadow(0 0 15px rgba(0,0,0,0.6));
      border-radius: 8px;
    }

    /* 4. Ghi chú & Chỉ số Real-time */
    .status-note {
      margin-top: 15px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 30px;
      font-size: 11px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #8b949e;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .value-display {
      color: #f2cc60; /* Màu vàng thương hiệu WinTrack */
      font-weight: 900;
      font-family: monospace;
      font-size: 14px;
    }

    .safe { color: #3fb950; font-weight: 800; }
    .danger { color: #f85149; font-weight: 800; }
    .divider { width: 1px; height: 10px; background: #30363d; }

    /* Hiệu ứng loading đơn giản */
    .loading { opacity: 0.5; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Hình ảnh trực quan -->
    <img src="https://alternative.me/crypto/fear-and-greed-index.png" alt="Fear & Greed Index">
    
    <div class="status-note">
        <!-- Dashboard chính sẽ đọc giá trị từ thẻ span dưới đây -->
        <span>VALUE: <span id="fear-val" class="value-display">--</span></span>
        <div class="divider"></div>
        <span><span class="safe">0-20:</span> MUA</span>
        <div class="divider"></div>
        <span><span class="danger">80-100:</span> THOÁT</span>
    </div>
  </div>

  <script>
    async function fetchFearData() {
      const fearValElement = document.getElementById('fear-val');
      
      try {
        // Gọi API lấy dữ liệu thực tế
        const response = await fetch('https://api.alternative.me/fng/');
        const data = await response.json();
        const value = data.data[0].value;
        
        // Cập nhật lên giao diện để trang chính truy cập
        fearValElement.innerText = value;
        fearValElement.classList.remove('loading');
        
        console.log("WinTrack 2026: Fear Index updated to " + value);
      } catch (error) {
        console.error("Lỗi lấy dữ liệu Fear & Greed:", error);
        fearValElement.innerText = "Error";
      }
    }

    // Chạy ngay khi load
    fetchFearData();

    // Tự động làm mới sau mỗi 10 phút (Crypto Fear & Greed không cập nhật quá nhanh)
    setInterval(fetchFearData, 600000);
  </script>
</body>
</html>
