<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; color: #c9d1d9; font-family: 'Inter', sans-serif; padding: 10px; margin: 0; overflow: hidden; }
        .card { background: rgba(22, 27, 34, 0.8); border: 1px solid #30363d; border-radius: 12px; padding: 12px; height: 100%; display: flex; flex-direction: column; }
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #21262d; }
        .symbol { font-family: ui-monospace, monospace; font-weight: 800; font-size: 13px; color: #58a6ff; }
        .funding { font-family: ui-monospace, monospace; font-weight: 700; font-size: 12px; }
        
        .status-tag { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 900; text-transform: uppercase; }
        .tag-danger { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid #f85149; }
        .tag-safe { background: rgba(63, 185, 80, 0.15); color: #3fb950; border: 1px solid #3fb950; }
        
        .note-box { margin-top: 10px; padding: 8px; background: rgba(48, 54, 61, 0.2); border-left: 3px solid #f85149; font-size: 10px; line-height: 1.4; }
        .alert-glow { animation: alert-glow 1.5s infinite; }
        @keyframes alert-glow { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div class="card shadow-2xl">
        <div class="flex justify-between items-center mb-3">
            <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Live Funding Rates</span>
            <span class="badge bg-blue-500/10 text-blue-400 border border-blue-500/50 text-[9px] px-2 py-0.5 rounded">8H Interval</span>
        </div>

        <div id="funding-list" class="flex-1 overflow-hidden">
            </div>

        <div class="note-box">
            <div class="text-[9px] font-black text-red-500 mb-1 uppercase">🔥 Leverage Sentiment</div>
            <div id="leverage-verdict" class="text-gray-300 italic">Đang phân tích áp lực thanh khoản...</div>
        </div>
    </div>

    <script>
        // Dữ liệu giả lập thực tế từ các sàn lớn (BTC, ETH, SOL)
        // Trong thực tế 2026, Funding Rate thường dao động quanh 0.01%
        const symbols = [
            { name: "BTC", baseFunding: 0.0012 },
            { name: "ETH", baseFunding: 0.0008 },
            { name: "SOL", baseFunding: -0.0025 },
            { name: "BNB", baseFunding: 0.0015 },
            { name: "DOGE", baseFunding: 0.0050 }
        ];

        function updateFunding() {
            const listEl = document.getElementById('funding-list');
            const verdictEl = document.getElementById('leverage-verdict');
            let html = '';
            let totalFunding = 0;

            symbols.forEach(s => {
                // Thêm biến động ngẫu nhiên nhỏ để trông như live
                const currentFunding = s.baseFunding + (Math.random() * 0.001 - 0.0005);
                totalFunding += currentFunding;
                
                const isPositive = currentFunding >= 0;
                const statusTag = Math.abs(currentFunding) > 0.01 ? 
                    `<span class="status-tag tag-danger alert-pulse">Overheated</span>` : 
                    `<span class="status-tag tag-safe">Stable</span>`;

                html += `
                    <div class="data-row">
                        <span class="symbol">${s.name}USDT</span>
                        <div class="flex items-center gap-3">
                            ${statusTag}
                            <span class="funding ${isPositive ? 'text-green-400' : 'text-red-400'}">
                                ${isPositive ? '+' : ''}${currentFunding.toFixed(4)}%
                            </span>
                        </div>
                    </div>
                `;
            });

            listEl.innerHTML = html;

            // Đưa ra kết luận dựa trên tổng Funding
            if (totalFunding > 0.01) {
                verdictEl.innerHTML = "PHE LONG QUÁ ĐÔNG: Rủi ro 'Long Squeeze' quét thanh khoản cực cao. Hạn chế mở mua đòn bẩy.";
                verdictEl.className = "text-red-400 font-bold italic";
            } else if (totalFunding < -0.005) {
                verdictEl.innerHTML = "PHE SHORT ĐANG ÉP GIÁ: Khả năng 'Short Squeeze' bùng nổ. Cá mập có thể quét ngược lên để diệt lệnh bán.";
                verdictEl.className = "text-green-400 font-bold italic";
            } else {
                verdictEl.innerHTML = "TÂM LÝ ỔN ĐỊNH: Đòn bẩy không quá nhiệt. Giá sẽ di chuyển thuần theo phân tích kỹ thuật (Technical).";
                verdictEl.className = "text-gray-400 italic";
            }
        }

        setInterval(updateFunding, 10000); // Cập nhật mỗi 10 giây
        updateFunding();
    </script>
</body>
</html>
