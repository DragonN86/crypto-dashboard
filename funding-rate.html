<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; color: #c9d1d9; font-family: 'Inter', sans-serif; padding: 10px; margin: 0; overflow: hidden; }
        .card { background: rgba(13, 17, 23, 0.98); border: 1px solid #30363d; border-radius: 12px; padding: 12px; height: 100vh; display: flex; flex-direction: column; }
        
        .radar-static { width: 8px; height: 8px; background: #238636; border-radius: 50%; display: inline-block; }

        .meter-bg { width: 100%; height: 4px; background: #21262d; border-radius: 10px; margin: 12px 0; }
        #meter-fill { height: 100%; width: 0%; transition: width 2s ease-in-out; }

        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #21262d; transition: opacity 1s; }
        .symbol-text { font-family: ui-monospace, monospace; font-weight: 700; font-size: 13px; color: #8b949e; }
        
        .alert-box { margin-top: auto; padding: 12px; border-radius: 8px; font-size: 11px; font-weight: 800; text-align: center; border: 1px solid #30363d; transition: all 1s; }
        
        /* Hiệu ứng mờ khi cập nhật dữ liệu */
        .updating { opacity: 0.3; }
    </style>
</head>
<body>
    <div class="card">
        <div class="flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="radar-static" id="status-dot"></div>
                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Leverage Monitor (60s Update)</span>
            </div>
            <span class="text-[9px] text-gray-600 font-mono" id="clock">--:--</span>
        </div>

        <div class="meter-bg">
            <div id="meter-fill" style="background: #3fb950;"></div>
        </div>

        <div id="list" class="flex-1"></div>

        <div id="alert" class="alert-box bg-[#161b22] text-gray-500">
            ĐANG THEO DÕI TÂM LÝ THỊ TRƯỜNG...
        </div>
    </div>

    <script>
        const coins = [
            { n: "BTC", b: 0.0012 },
            { n: "ETH", b: 0.0008 },
            { n: "SOL", b: -0.0025 },
            { n: "DOGE", b: 0.0050 }
        ];

        function refresh() {
            const list = document.getElementById('list');
            const alert = document.getElementById('alert');
            const meter = document.getElementById('meter-fill');
            const dot = document.getElementById('status-dot');
            
            // Hiệu ứng mờ nhẹ khi cập nhật
            list.classList.add('updating');
            
            setTimeout(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                let totalRisk = 0;
                let html = '';

                coins.forEach(c => {
                    // Biến động rất nhỏ để không gây nhiễu
                    const f = c.b + (Math.random() * 0.001 - 0.0005);
                    const absF = Math.abs(f);
                    totalRisk += absF;
                    
                    const isExtreme = absF > 0.01;
                    html += `
                        <div class="data-row">
                            <span class="symbol-text ${isExtreme ? 'text-red-400' : ''}">${c.n}USDT</span>
                            <div class="flex items-center gap-3">
                                <span class="font-mono font-bold text-[12px] ${f >= 0 ? 'text-green-500/80' : 'text-red-500/80'}">
                                    ${f >= 0 ? '+' : ''}${f.toFixed(4)}%
                                </span>
                            </div>
                        </div>
                    `;
                });

                list.innerHTML = html;
                list.classList.remove('updating');

                // Cập nhật thanh đo độ rủi ro (Giữ màu xanh nếu an toàn)
                const level = Math.min(totalRisk * 2000, 100);
                meter.style.width = level + '%';
                meter.style.background = level > 70 ? '#f85149' : level > 40 ? '#d29922' : '#238636';

                // Verdict tĩnh lặng
                if (totalRisk > 0.02) {
                    alert.style.color = "#f85149"; alert.style.borderColor = "#f85149";
                    alert.innerText = "CẢNH BÁO: ĐÒN BẨY ĐANG TĂNG CAO";
                    dot.style.background = "#f85149";
                } else {
                    alert.style.color = "#8b949e"; alert.style.borderColor = "#30363d";
                    alert.innerText = "THỊ TRƯỜNG ỔN ĐỊNH - ĐỢI BIẾN ĐỘNG";
                    dot.style.background = "#238636";
                }
            }, 500);
        }

        // Cập nhật mỗi 60 giây để tránh nhảy số liên tục
        setInterval(refresh, 60000);
        refresh();
    </script>
</body>
</html>
