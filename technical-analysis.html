<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Spot Pro - Full Analysis v3.1 (W1)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background: #0a0c12; color: #e0e7ff; font-family: 'Inter', sans-serif; }
        .dashboard-container {
            width: 100%; 
            max-width: 520px;
            background: #0f172a; 
            border: 1px solid #334155;
            border-radius: 28px; 
            padding: 20px; 
            box-shadow: 0 25px 70px rgba(0,0,0,0.7);
        }
        .main-value { font-size: 1.25rem; font-weight: 700; letter-spacing: -2px; }
        .bar-bg { height: 7px; background: #1e2937; border-radius: 9999px; overflow: hidden; }
        .bar-fill { height: 100%; transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .alert-flash { animation: flash 1.3s infinite; }
        @keyframes flash { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }

        .confidence-bg {
            height: 9px; 
            background: #1e2937; 
            border-radius: 9999px; 
            overflow: hidden;
        }
    </style>
</head>
<body class="flex justify-center p-4 min-h-screen">
    <div class="dashboard-container">
        <!-- HEADER -->
        <div class="flex justify-between items-start mb-6">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📊</span>
                <div>
                    <h1 class="font-black text-2xl tracking-tighter">BTC Spot <span class="text-emerald-400">(W1)</span></h1>
                    <p class="text-xs text-slate-400 -mt-1">Technical Analysis v3.1</p>
                </div>
            </div>
            <div>
                <div id="current-price" class="font-mono text-3xl font-bold text-emerald-400">65,000</div>
                <p id="last-updated" class="text-[10px] text-right text-slate-500">Đang cập nhật...</p>
            </div>
        </div>

        <!-- DCA TRACKER -->
        <div class="bg-blue-900/20 border border-blue-500/30 rounded-2xl p-4 mb-6">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">DCA Tracker</span>
                <button onclick="setEntryPrice()" class="text-[10px] bg-blue-500/30 hover:bg-blue-500/50 px-3 py-1 rounded-lg transition-colors">Sửa giá gom</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-[10px] text-slate-400 uppercase font-bold">Giá trung bình</p>
                    <p id="entry-price-display" class="font-mono font-bold text-xl text-white">$0</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 uppercase font-bold">Lợi nhuận</p>
                    <p id="profit-pct" class="font-mono font-bold text-xl">0.00%</p>
                </div>
            </div>
        </div>

        <!-- INDICATORS -->
        <div class="bg-slate-900/70 border border-slate-700 rounded-3xl p-5 mb-5">
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div>
                    <div class="text-[10px] uppercase tracking-widest text-slate-500 font-black mb-1">RSI (14)</div>
                    <div id="rsi-val" class="main-value text-white">50.00</div>
                    <span id="rsi-status" class="inline-block mt-3 px-3 py-1 text-[9px] font-black rounded-lg">NEUTRAL</span>
                </div>
                <div>
                    <div class="text-[10px] uppercase tracking-widest text-slate-500 font-black mb-1">MACD Hist</div>
                    <div id="macd-val" class="main-value text-emerald-400">0.00</div>
                </div>
            </div>

            <div class="space-y-5">
                <div class="flex justify-between text-xs font-mono">
                    <span class="text-slate-400">EMA 200 (W1):</span>
                    <span id="ema200-val" class="font-bold text-white">---</span>
                </div>

                <div>
                    <div class="flex justify-between text-[10px] text-slate-500 font-black uppercase mb-1">
                        <span>Volume Analysis</span>
                        <span id="vol-ratio" class="text-blue-400">0%</span>
                    </div>
                    <div class="bar-bg">
                        <div id="vol-bar" class="bar-fill bg-blue-500" style="width: 0%"></div>
                    </div>
                </div>

                <div>
                    <div class="text-[10px] uppercase tracking-widest text-slate-500 font-black mb-2">Bollinger Bands (20,2)</div>
                    <div class="flex justify-between text-xs font-mono">
                        <span class="text-red-400">Upper: <span id="bb-upper">---</span></span>
                        <span class="text-emerald-400">Lower: <span id="bb-lower">---</span></span>
                    </div>
                </div>
            </div>
        </div>

        <!-- VERDICT + CONFIDENCE -->
        <div id="verdict-box" class="rounded-3xl p-6 transition-all duration-500">
            <div class="flex items-center gap-3 mb-4">
                <div id="signal-dot" class="w-3 h-3 rounded-full animate-ping"></div>
                <h2 id="strat-text" class="text-xl font-black tracking-tighter uppercase">Analyzing...</h2>
            </div>
            
            <p id="verdict-text" class="text-sm leading-relaxed text-slate-300 mb-5"></p>

            <div>
                <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1.5">
                    <span>ĐIỂM TIN CẬY</span>
                    <span id="score-number" class="font-mono">0</span>
                </div>
                <div class="confidence-bg">
                    <div id="score-bar" class="h-full transition-all duration-700" style="width: 45%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let entryPrice = parseFloat(localStorage.getItem('btc_entry_price')) || 0;
        document.getElementById('entry-price-display').textContent = '$' + entryPrice.toLocaleString('en-US');

        function setEntryPrice() {
            const input = prompt("Nhập giá trung bình gom BTC (USD):", entryPrice || 65000);
            if (input === null) return;
            entryPrice = parseFloat(input) || 0;
            localStorage.setItem('btc_entry_price', entryPrice);
            document.getElementById('entry-price-display').textContent = '$' + entryPrice.toLocaleString('en-US');
        }

        function calculateEMA(data, period) {
            if (data.length < period) return data[data.length-1];
            // Khởi tạo bằng SMA cho chính xác hơn
            let sum = data.slice(0, period).reduce((a,b)=>a+b,0);
            let ema = sum / period;
            const result = [ema];
            const k = 2 / (period + 1);
            for (let i = period; i < data.length; i++) {
                ema = (data[i] * k) + (ema * (1 - k));
                result.push(ema);
            }
            return result;
        }

        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return 50;
            // ... (giữ nguyên hàm RSI cũ của bạn, mình không thay đổi để giữ ổn định)
            const changes = prices.slice(1).map((p,i) => p - prices[i]);
            let avgGain = 0, avgLoss = 0;
            for (let i = 0; i < period; i++) {
                if (changes[i] > 0) avgGain += changes[i];
                else avgLoss -= changes[i];
            }
            avgGain /= period; avgLoss /= period;
            for (let i = period; i < changes.length; i++) {
                const gain = changes[i] > 0 ? changes[i] : 0;
                const loss = changes[i] < 0 ? -changes[i] : 0;
                avgGain = (avgGain * (period-1) + gain) / period;
                avgLoss = (avgLoss * (period-1) + loss) / period;
            }
            return avgLoss === 0 ? 100 : Math.min(100, Math.max(0, 100 - (100 / (1 + avgGain/avgLoss))));
        }

        async function updateData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1w&limit=300`);
                const candles = await res.json();
                const prices = candles.map(c => parseFloat(c[4]));
                const volumes = candles.map(c => parseFloat(c[5]));
                
                const lastPrice = prices[prices.length - 1];
                const lastVol = volumes[volumes.length - 1];

                const rsi = calculateRSI(prices);
                const ema200Arr = calculateEMA(prices, 200);
                const lastEMA200 = ema200Arr[ema200Arr.length - 1];

                // ... (các tính toán MACD, BB, VolRatio giữ nguyên như cũ của bạn)

                const ema12 = calculateEMA(prices, 12);
                const ema26 = calculateEMA(prices, 26);
                const macdLine = ema12.map((v, i) => v - ema26[i]);
                const signalLine = calculateEMA(macdLine, 9);
                const hist = macdLine[macdLine.length - 1] - signalLine[signalLine.length - 1];

                const slice20 = prices.slice(-20);
                const sma20 = slice20.reduce((a, b) => a + b, 0) / 20;
                const stdDev = Math.sqrt(slice20.reduce((a, b) => a + (b - sma20) ** 2, 0) / 20);
                const bbUpper = sma20 + 2 * stdDev;
                const bbLower = sma20 - 2 * stdDev;
                const bbPosition = (lastPrice - bbLower) / (bbUpper - bbLower);

                const avgVol = volumes.slice(-20).reduce((a, b) => a + b, 0) / 20;
                const volRatio = (lastVol / avgVol) * 100;

                // === UI UPDATE ===
                document.getElementById('current-price').textContent = lastPrice.toLocaleString('en-US');
                document.getElementById('last-updated').textContent = "Cập nhật: vừa xong";

                // RSI + Status
                document.getElementById('rsi-val').textContent = rsi.toFixed(1);
                const rsiStatus = document.getElementById('rsi-status');
                if (rsi > 70) {
                    rsiStatus.textContent = "OVERBOUGHT";
                    rsiStatus.className = "inline-block mt-3 px-3 py-1 text-[9px] font-black rounded-lg bg-red-500/20 text-red-400";
                } else if (rsi < 30) {
                    rsiStatus.textContent = "OVERSOLD";
                    rsiStatus.className = "inline-block mt-3 px-3 py-1 text-[9px] font-black rounded-lg bg-emerald-500/20 text-emerald-400";
                } else {
                    rsiStatus.textContent = "NEUTRAL";
                    rsiStatus.className = "inline-block mt-3 px-3 py-1 text-[9px] font-black rounded-lg bg-slate-700 text-slate-300";
                }

                // Các update khác...
                document.getElementById('macd-val').textContent = hist.toFixed(2);
                document.getElementById('macd-val').className = `main-value ${hist >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                document.getElementById('ema200-val').textContent = Math.round(lastEMA200).toLocaleString();
                document.getElementById('bb-upper').textContent = Math.round(bbUpper).toLocaleString();
                document.getElementById('bb-lower').textContent = Math.round(bbLower).toLocaleString();
                document.getElementById('vol-ratio').textContent = volRatio.toFixed(0) + "%";
                document.getElementById('vol-bar').style.width = Math.min(100, volRatio) + "%";

                // Profit
                if (entryPrice > 0) {
                    const profit = ((lastPrice - entryPrice) / entryPrice) * 100;
                    const pEl = document.getElementById('profit-pct');
                    pEl.textContent = (profit >= 0 ? "+" : "") + profit.toFixed(2) + "%";
                    pEl.className = `font-mono font-bold text-xl ${profit >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                }

                // Scoring & Verdict (giữ logic cũ của bạn)
                let score = 0;
                if (rsi < 35) score += 40; else if (rsi > 72) score -= 40;
                if (bbPosition < 0.25) score += 30; else if (bbPosition > 0.75) score -= 30;
                if (hist > 0) score += 20;
                if (volRatio > 140) score += 18;
                if (lastPrice > lastEMA200) score += 25; else score -= 30;

                // Confidence Bar
                const scoreEl = document.getElementById('score-number');
                const scoreBar = document.getElementById('score-bar');
                scoreEl.textContent = score;
                const width = Math.min(100, Math.max(0, (Math.abs(score) / 130) * 100));
                scoreBar.style.width = width + "%";
                scoreBar.style.background = score >= 30 ? 
                    "linear-gradient(to right, #10b981, #22d3ee)" : 
                    "linear-gradient(to right, #f59e0b, #ef4444)";

                // Verdict + Box Color
                let verdict = "KIÊN NHẪN - QUAN SÁT";
                let stratColor = "text-slate-400";
                let boxBorder = "border-slate-700";
                let dotColor = "bg-slate-500";

                if (score >= 85) {
                    verdict = "VÙNG GOM DCA MẠNH";
                    stratColor = "text-emerald-400";
                    boxBorder = "border-emerald-500/50";
                    dotColor = "bg-emerald-500 animate-ping";
                } else if (score >= 55) {
                    verdict = "PHỤC HỒI - NẮM GIỮ";
                    stratColor = "text-sky-400";
                    boxBorder = "border-sky-500/40";
                    dotColor = "bg-sky-500";
                } else if (score <= -50) {
                    verdict = "CHỐT LỜI / REBALANCE";
                    stratColor = "text-red-400";
                    boxBorder = "border-red-500/50";
                    dotColor = "bg-red-500";
                }

                document.getElementById('verdict-box').className = `rounded-3xl p-6 border ${boxBorder} bg-slate-900/60 transition-all duration-500`;
                document.getElementById('strat-text').textContent = verdict;
                document.getElementById('strat-text').className = `text-xl font-black tracking-tighter uppercase ${stratColor}`;
                document.getElementById('verdict-text').textContent = score >= 85 ? "Tín hiệu mua mạnh - Nên DCA thêm." : "Thị trường đang trong giai đoạn quan sát.";
                document.getElementById('signal-dot').className = `w-3 h-3 rounded-full ${dotColor}`;

            } catch (e) {
                document.getElementById('last-updated').textContent = "Lỗi kết nối";
                console.error(e);
            }
        }

        setInterval(updateData, 25000);
        updateData();
    </script>
</body>
</html>
