<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Spot Pro - Technical Analysis v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background: #0a0c12; color: #e0e7ff; font-family: 'Inter', sans-serif; }
        .dashboard-container {
            width: 100%; max-width: 450px; background: #0f172a; border: 1px solid #334155;
            border-radius: 28px; padding: 24px; box-shadow: 0 25px 70px rgba(0,0,0,0.7);
        }
        .main-value { font-size: 1.25rem; font-weight: 700; }
        .bar-bg { height: 6px; background: #1e2937; border-radius: 9999px; overflow: hidden; }
        .bar-fill { height: 100%; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .alert-flash { animation: flash 1.3s infinite; }
        @keyframes flash { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .confidence-bg { height: 10px; background: #1e2937; border-radius: 5px; position: relative; overflow: hidden; }
    </style>
</head>
<body class="flex justify-center items-start p-4 min-h-screen">

    <div class="dashboard-container">
        <div class="flex justify-between items-start mb-6">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📊</span>
                <div>
                    <h1 class="font-black text-xl tracking-tighter">BTC SPOT <span class="text-emerald-400">W1</span></h1>
                    <p class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Live Analysis</p>
                </div>
            </div>
            <div id="current-price" class="font-mono text-2xl font-bold text-emerald-400 text-right">0.00</div>
        </div>

        <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-4 mb-6">
            <div class="flex justify-between items-center mb-2">
                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">DCA Status</span>
                <button onclick="setEntryPrice()" class="text-[9px] bg-blue-500/20 hover:bg-blue-500/40 text-blue-400 px-2 py-1 rounded transition-colors uppercase font-bold">Set Entry</button>
            </div>
            <div class="flex justify-between items-end">
                <div>
                    <p id="entry-price-display" class="font-mono font-bold text-lg text-white">$0</p>
                    <p class="text-[9px] text-slate-500 uppercase">Average Entry</p>
                </div>
                <div class="text-right">
                    <p id="profit-pct" class="font-mono font-bold text-lg">0.00%</p>
                    <p class="text-[9px] text-slate-500 uppercase">P/L Percent</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-1">RSI (14)</p>
                <div id="rsi-val" class="text-lg font-bold">--</div>
            </div>
            <div class="bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                <p class="text-[9px] text-slate-500 font-black uppercase mb-1">MACD Hist</p>
                <div id="macd-val" class="text-lg font-bold">--</div>
            </div>
        </div>

        <div class="space-y-4 mb-6 bg-slate-900/30 p-4 rounded-2xl border border-slate-800/50">
            <div class="flex justify-between text-xs font-mono">
                <span class="text-slate-500 font-bold">EMA 200 (W1):</span>
                <span id="ema200-val" class="text-white">---</span>
            </div>
            <div>
                <div class="flex justify-between text-[9px] font-black uppercase mb-1">
                    <span class="text-slate-500">Vol Ratio (VSA)</span>
                    <span id="vol-ratio" class="text-blue-400">0%</span>
                </div>
                <div class="bar-bg"><div id="vol-bar" class="bar-fill bg-blue-500" style="width: 0%"></div></div>
            </div>
            <div class="flex justify-between text-[9px] font-black uppercase">
                <span class="text-slate-500">BB Pos: <span id="bb-pos" class="text-white">--</span></span>
                <span class="text-slate-500">Lower BB: <span id="bb-lower" class="text-emerald-500">--</span></span>
            </div>
        </div>

        <div id="verdict-box" class="rounded-3xl p-5 border border-slate-700 bg-slate-900/80 transition-all duration-500">
            <div class="mb-4">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Điểm tin cậy chiến lược</span>
                    <span id="score-number" class="font-mono text-lg font-bold">0</span>
                </div>
                <div class="confidence-bg flex">
                    <div id="score-bar-negative" class="h-full bg-red-500/80 transition-all duration-1000" style="width: 0%"></div>
                    <div id="score-bar-positive" class="h-full bg-emerald-500/80 transition-all duration-1000" style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-[7px] text-slate-600 mt-1 font-black uppercase tracking-tighter">
                    <span>Overbought/Risk</span>
                    <span>Neutral</span>
                    <span>Oversold/Buy</span>
                </div>
            </div>

            <div class="flex items-center gap-3 pt-3 border-t border-slate-800">
                <div id="signal-dot" class="w-2.5 h-2.5 rounded-full bg-slate-600"></div>
                <h2 id="strat-text" class="text-lg font-black tracking-tighter uppercase">Analyzing...</h2>
            </div>
            <p id="verdict-text" class="text-[11px] leading-relaxed text-slate-400 mt-1 italic">Vui lòng chờ dữ liệu từ sàn...</p>
        </div>
    </div>

    <script>
        let entryPrice = parseFloat(localStorage.getItem('btc_entry_price')) || 0;
        document.getElementById('entry-price-display').textContent = '$' + entryPrice.toLocaleString();

        function setEntryPrice() {
            const input = prompt("Nhập giá vốn BTC của bạn (USD):", entryPrice || 60000);
            if (input === null) return;
            entryPrice = parseFloat(input) || 0;
            localStorage.setItem('btc_entry_price', entryPrice);
            document.getElementById('entry-price-display').textContent = '$' + entryPrice.toLocaleString();
            updateData();
        }

        function calculateEMA(data, period) {
            const k = 2 / (period + 1);
            let ema = data[0];
            return data.map(val => ema = (val * k) + (ema * (1 - k)));
        }

        function calculateRSI(prices, period = 14) {
            let gains = 0, losses = 0;
            for (let i = 1; i <= period; i++) {
                const diff = prices[i] - prices[i-1];
                diff > 0 ? gains += diff : losses -= diff;
            }
            let avgGain = gains / period, avgLoss = losses / period;
            for (let i = period + 1; i < prices.length; i++) {
                const diff = prices[i] - prices[i-1];
                avgGain = (avgGain * (period - 1) + (diff > 0 ? diff : 0)) / period;
                avgLoss = (avgLoss * (period - 1) + (diff < 0 ? -diff : 0)) / period;
            }
            return 100 - (100 / (1 + avgGain / avgLoss));
        }

        async function updateData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1w&limit=250`);
                const candles = await res.json();
                const prices = candles.map(c => parseFloat(c[4]));
                const volumes = candles.map(c => parseFloat(c[5]));
                const lastPrice = prices[prices.length - 1];

                // Indicators logic
                const rsi = calculateRSI(prices);
                const macdEma12 = calculateEMA(prices, 12);
                const macdEma26 = calculateEMA(prices, 26);
                const macdLine = macdEma12.map((v, i) => v - macdEma26[i]);
                const signalLine = calculateEMA(macdLine, 9);
                const hist = macdLine[macdLine.length - 1] - signalLine[signalLine.length - 1];
                
                const ema200 = calculateEMA(prices, 200).pop();
                const slice20 = prices.slice(-20);
                const sma20 = slice20.reduce((a, b) => a + b, 0) / 20;
                const stdDev = Math.sqrt(slice20.reduce((a, b) => a + (b - sma20) ** 2, 0) / 20);
                const bbLower = sma20 - 2 * stdDev;
                const bbUpper = sma20 + 2 * stdDev;
                const bbPos = (lastPrice - bbLower) / (bbUpper - bbLower);
                const avgVol = volumes.slice(-20).reduce((a, b) => a + b, 0) / 20;
                const volRatio = (volumes[volumes.length - 1] / avgVol) * 100;

                // UI Global
                document.getElementById('current-price').textContent = lastPrice.toLocaleString();
                document.getElementById('rsi-val').textContent = rsi.toFixed(1);
                document.getElementById('macd-val').textContent = hist.toFixed(1);
                document.getElementById('macd-val').className = hist >= 0 ? 'text-emerald-400' : 'text-red-400';
                document.getElementById('ema200-val').textContent = Math.round(ema200).toLocaleString();
                document.getElementById('vol-ratio').textContent = Math.round(volRatio) + "%";
                document.getElementById('vol-bar').style.width = Math.min(100, volRatio) + "%";
                document.getElementById('bb-pos').textContent = (bbPos * 100).toFixed(0) + "%";
                document.getElementById('bb-lower').textContent = Math.round(bbLower).toLocaleString();

                if (entryPrice > 0) {
                    const p = ((lastPrice - entryPrice) / entryPrice) * 100;
                    const pEl = document.getElementById('profit-pct');
                    pEl.textContent = (p >= 0 ? "+" : "") + p.toFixed(2) + "%";
                    pEl.className = `font-mono font-bold text-lg ${p >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                }

                // Scoring System
                let score = 0;
                if (rsi < 35) score += 45; else if (rsi > 70) score -= 45;
                if (bbPos < 0.2) score += 30; else if (bbPos > 0.8) score -= 30;
                if (hist > 0) score += 15;
                if (lastPrice > ema200) score += 20; else score -= 25;
                if (volRatio > 130) score += 10;

                // Confidence Bar UI
                const maxS = 120;
                const sNum = document.getElementById('score-number');
                const pBar = document.getElementById('score-bar-positive');
                const nBar = document.getElementById('score-bar-negative');
                
                sNum.textContent = (score > 0 ? "+" : "") + score;
                if (score >= 0) {
                    pBar.style.width = Math.min(100, (score/maxS)*100) + "%";
                    nBar.style.width = "0%";
                    sNum.className = "font-mono text-lg font-bold text-emerald-400";
                } else {
                    nBar.style.width = Math.min(100, (Math.abs(score)/maxS)*100) + "%";
                    pBar.style.width = "0%";
                    sNum.className = "font-mono text-lg font-bold text-red-400";
                }

                // Verdict Logic
                let vText = "KIÊN NHẪN QUAN SÁT";
                let vDesc = "Thị trường chưa rõ xu hướng, hạn chế mua đuổi.";
                let vColor = "text-slate-400";
                let vDot = "bg-slate-500";
                let bColor = "border-slate-700";

                if (score >= 80) {
                    vText = "VÙNG GOM DCA MẠNH";
                    vDesc = "Các chỉ báo kỹ thuật khung W1 đang ở vùng chiết khấu cực tốt.";
                    vColor = "text-emerald-400 alert-flash";
                    vDot = "bg-emerald-500 animate-ping";
                    bColor = "border-emerald-500/50";
                } else if (score >= 40) {
                    vText = "XU HƯỚNG PHỤC HỒI";
                    vDesc = "Dòng tiền có dấu hiệu quay lại, ưu tiên nắm giữ.";
                    vColor = "text-sky-400";
                    vDot = "bg-sky-500";
                    bColor = "border-sky-500/30";
                } else if (score <= -50) {
                    vText = "CẢNH BÁO CHỐT LỜI";
                    vDesc = "Rủi ro điều chỉnh cao, nên hiện thực hóa lợi nhuận.";
                    vColor = "text-red-400";
                    vDot = "bg-red-500 animate-pulse";
                    bColor = "border-red-500/50";
                }

                document.getElementById('strat-text').textContent = vText;
                document.getElementById('strat-text').className = `text-lg font-black tracking-tighter uppercase ${vColor}`;
                document.getElementById('verdict-text').textContent = vDesc;
                document.getElementById('signal-dot').className = `w-2.5 h-2.5 rounded-full ${vDot}`;
                document.getElementById('verdict-box').className = `rounded-3xl p-5 border ${bColor} bg-slate-900/80 transition-all duration-500`;

            } catch (e) { console.error("Update Error:", e); }
        }

        setInterval(updateData, 30000);
        updateData();
    </script>
</body>
</html>
