<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; color: #c9d1d9; font-family: sans-serif; padding: 10px; margin: 0; }
        .row { border-bottom: 1px solid #30363d; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .badge-red { background: rgba(248,81,73,0.1); color: #f85149; border: 1px solid #f85149; }
        .badge-orange { background: rgba(210,153,34,0.1); color: #d29922; border: 1px solid #d29922; }
    </style>
</head>
<body>
    <div class="row">
        <div><span class="text-gray-500 text-[10px] block">RSI WEEKLY (W1)</span><span class="text-white font-mono text-lg">68.42</span></div>
        <span class="badge badge-red">Ngưỡng rủi ro: 85+</span>
    </div>
    <div class="row">
        <div><span class="text-gray-500 text-[10px] block">DIVERGENCE</span><span class="text-white text-sm">Phân kỳ RSI/MACD</span></div>
        <span class="badge badge-red">Rất cao</span>
    </div>
    <div class="row">
        <div><span class="text-gray-500 text-[10px] block">ON-CHAIN GAS</span><span class="text-white text-sm">ETH Gas Tracker</span></div>
        <span class="badge badge-orange">Trung bình</span>
    </div>
    
    <div class="mt-4 rounded-lg overflow-hidden border border-[#30363d]" style="height: 250px;">
        <iframe src="https://s.tradingview.com/widgetembed/?symbol=BINANCE%3ABTCUSDT&interval=W&theme=dark" style="width: 100%; height: 100%;"></iframe>
    </div>
</body>
</html>
