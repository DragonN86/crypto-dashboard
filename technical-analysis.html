<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Spot Pro - Full Analysis v3 (W1)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background: #0a0c12; color: #e0e7ff; font-family: 'Inter', sans-serif; }
        .dashboard-container {
            width: 100%; max-width: 100%; background: #0f172a; border: 1px solid #334155;
            border-radius: 28px; padding: 20px; box-shadow: 0 25px 70px rgba(0,0,0,0.7);
        }
        .main-value { font-size: 1.25rem; font-weight: 700; letter-spacing: -2px; }
        .bar-bg { height: 7px; background: #1e2937; border-radius: 9999px; overflow: hidden; }
        .bar-fill { height: 100%; transition: all 1s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>

<body class="flex justify-center p-4 min-h-screen">
<div class="dashboard-container">

    <!-- HEADER -->
    <div class="flex justify-between items-start mb-6">
        <div class="flex items-center gap-3">
            <span class="text-3xl">📊</span>
            <div>
                <h1 class="font-black text-2xl tracking-tighter">
                    BTC Spot <span class="text-emerald-400">(W1)</span>
                </h1>
                <p class="text-xs text-slate-400 -mt-1">Technical Analysis v3</p>
            </div>
        </div>
        <div id="current-price" class="font-mono text-3xl font-bold text-emerald-400">---</div>
    </div>

    <!-- INDICATORS -->
    <div class="bg-slate-900/70 border border-slate-700 rounded-3xl p-5 mb-5">
        <div class="grid grid-cols-2 gap-6 mb-6">
            <div>
                <div class="text-[10px] uppercase text-slate-500 font-black mb-1">RSI</div>
                <div id="rsi-val" class="main-value">--</div>
            </div>
            <div>
                <div class="text-[10px] uppercase text-slate-500 font-black mb-1">MACD</div>
                <div id="macd-val" class="main-value">--</div>
            </div>
        </div>

        <div class="pt-4 border-t border-slate-800 mb-4">
            <div class="flex justify-between text-xs">
                <span>EMA200</span>
                <span id="ema200-val">---</span>
            </div>
        </div>

        <div>
            <div class="flex justify-between text-xs mb-1">
                <span>Volume</span>
                <span id="vol-ratio">---</span>
            </div>
            <div class="bar-bg">
                <div id="vol-bar" class="bar-fill bg-blue-500" style="width:0%"></div>
            </div>
        </div>
    </div>

    <!-- VERDICT -->
    <div id="verdict-box" class="rounded-3xl p-6 border border-slate-700">
        <h2 id="strat-text" class="text-xl font-black">Đang phân tích...</h2>
        <p id="verdict-text" class="text-sm text-slate-400 mt-2"></p>

        <div class="mt-4">
            <div class="flex justify-between text-xs mb-1">
                <span>Score</span>
                <span id="score-val">0</span>
            </div>
            <div class="bar-bg">
                <div id="score-bar" class="bar-fill bg-emerald-500" style="width:0%"></div>
            </div>
        </div>
    </div>

</div>

<script>
function calculateEMA(data, period) {
    const k = 2 / (period + 1);
    let ema = data[0];
    return data.map(price => ema = price * k + ema * (1 - k));
}

function calculateRSI(prices, period = 14) {
    let gains = 0, losses = 0;
    for (let i = 1; i <= period; i++) {
        let diff = prices[i] - prices[i-1];
        if (diff >= 0) gains += diff;
        else losses -= diff;
    }
    let rs = gains / losses;
    return 100 - (100 / (1 + rs));
}

async function updateData() {
    try {
        const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1w&limit=300`);
        const candles = await res.json();

        const prices = candles.map(c => parseFloat(c[4]));
        const volumes = candles.map(c => parseFloat(c[5]));

        const lastPrice = prices.at(-1);
        const lastVol = volumes.at(-1);

        const rsi = calculateRSI(prices);
        const ema200 = calculateEMA(prices, 200).at(-1);

        const ema12 = calculateEMA(prices,12);
        const ema26 = calculateEMA(prices,26);
        const macd = ema12.at(-1) - ema26.at(-1);

        const avgVol = volumes.slice(-20).reduce((a,b)=>a+b)/20;
        const volRatio = (lastVol/avgVol)*100;

        // Bollinger
        const slice = prices.slice(-20);
        const sma = slice.reduce((a,b)=>a+b)/20;
        const std = Math.sqrt(slice.reduce((a,b)=>a+(b-sma)**2,0)/20);
        const bbUpper = sma + 2*std;
        const bbLower = sma - 2*std;
        const bbPosition = (lastPrice - bbLower)/(bbUpper - bbLower);

        // === SCORE ENGINE ===
        let score = 0;

        if (rsi < 35) score += 40;
        else if (rsi > 70) score -= 40;

        if (bbPosition < 0.25) score += 30;
        else if (bbPosition > 0.75) score -= 30;

        if (macd > 0) score += 20;
        if (volRatio > 140) score += 18;

        if (lastPrice > ema200) score += 25;
        else score -= 30;

        let verdict = "KIÊN NHẪN";
        let color = "text-slate-400";

        if (score >= 85) {
            verdict = "VÙNG GOM DCA MẠNH";
            color = "text-emerald-400";
        } else if (score >= 55) {
            verdict = "PHỤC HỒI - NẮM GIỮ";
            color = "text-sky-400";
        } else if (score <= -50) {
            verdict = "CHỐT LỜI";
            color = "text-red-400";
        }

        // UI
        document.getElementById('current-price').textContent = Math.round(lastPrice).toLocaleString();
        document.getElementById('rsi-val').textContent = rsi.toFixed(1);
        document.getElementById('macd-val').textContent = macd.toFixed(2);
        document.getElementById('ema200-val').textContent = Math.round(ema200).toLocaleString();

        document.getElementById('vol-ratio').textContent = volRatio.toFixed(0) + "%";
        document.getElementById('vol-bar').style.width = Math.min(100, volRatio) + "%";

        document.getElementById('strat-text').textContent = verdict;
        document.getElementById('strat-text').className = "text-xl font-black " + color;
        document.getElementById('verdict-text').textContent = "Score hệ thống: " + score;

        document.getElementById('score-val').textContent = score;
        document.getElementById('score-bar').style.width = Math.min(100, Math.abs(score)) + "%";

        // Gửi data ra index
        window.parent.postMessage({
            type: 'WINTRACK_UPDATE',
            rsi: rsi,
            score: score,
            verdict: verdict,
            ema200Trend: lastPrice > ema200 ? "BULL" : "BEAR",
            bbPosition: bbPosition,
            volRatio: volRatio,
            macdHist: macd
        }, "*");

    } catch(e) {
        console.error(e);
    }
}

setInterval(updateData, 25000);
updateData();
</script>

</body>
</html>
