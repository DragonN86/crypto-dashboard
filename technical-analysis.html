<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; color: #c9d1d9; font-family: 'Inter', sans-serif; padding: 12px; margin: 0; overflow: hidden; }
        .row-item { border-bottom: 1px solid #30363d; padding: 15px 0; display: flex; flex-direction: column; gap: 6px; }
        .main-value { font-family: ui-monospace, monospace; font-weight: bold; font-size: 1.3rem; }
        
        .glow-green { text-shadow: 0 0 12px rgba(63, 185, 80, 0.5); }
        .glow-red { text-shadow: 0 0 12px rgba(248, 81, 73, 0.5); }

        .bearish-active { color: #f85149; animation: alert-red 1.2s infinite; }
        .bullish-active { color: #3fb950; animation: alert-green 1.2s infinite; }

        @keyframes alert-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; filter: brightness(1.5); } }
        @keyframes alert-green { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; filter: brightness(1.5); } }

        .badge { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; text-transform: uppercase; border: 1px solid transparent; }
        .badge-red { background: rgba(248,81,73,0.15); color: #f85149; border-color: #f85149; }
        .badge-green { background: rgba(63,185,80,0.15); color: #3fb950; border-color: #3fb950; }
        .badge-orange { background: rgba(210,153,34,0.15); color: #d29922; border-color: #d29922; }
        .badge-blue { background: rgba(88,166,255,0.15); color: #58a6ff; border-color: #58a6ff; }
        .badge-gray { background: rgba(48,54,61,0.3); color: #8b949e; border-color: #30363d; }
        
        .risk-bar-bg { width: 100%; height: 6px; background: #21262d; border-radius: 10px; overflow: hidden; }
        .risk-bar-fill { height: 100%; transition: width 0.8s ease-in-out, background 0.5s; width: 0%; }

        /* Kết luận cuối cùng */
        #verdict-box { margin-top: 10px; padding: 8px; border-radius: 8px; font-size: 10px; font-weight: 700; text-align: center; border: 1px dashed #30363d; }
    </style>
</head>
<body>

    <div class="row-item">
        <div class="flex justify-between items-center text-[10px] text-gray-500 uppercase font-bold tracking-widest">
            <div class="flex items-center gap-2">
                <span>RSI Weekly (W1)</span>
                <span id="price-change" class="font-black text-[9px]">--%</span>
            </div>
            <span id="rsi-status" class="badge badge-gray">Syncing...</span>
        </div>
        <span id="rsi-val" class="main-value text-blue-400">--.--</span>
    </div>

    <div class="row-item bg-black/20 p-3 rounded-xl border border-[#30363d]">
        <div class="flex justify-between items-center mb-1">
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">W1 Strategy Signal</span>
            <span id="strat-badge" class="badge badge-gray">Neutral</span>
        </div>
        <span id="strat-text" class="main-value text-gray-600">WAITING DATA</span>
        <div class="flex justify-between items-center text-[10px] mt-2">
            <span id="strat-desc" class="text-gray-500 font-bold">Analyzing...</span>
            <span id="signal-power" class="text-gray-400 font-black tracking-tighter">0%</span>
        </div>
        <div class="risk-bar-bg mt-1">
            <div id="risk-bar" class="risk-bar-fill"></div>
        </div>

        <div id="verdict-box" class="text-gray-500">
            SCANNING MARKET VERDICT...
        </div>
    </div>

    <div class="row-item border-none">
        <div class="flex justify-between items-center text-[10px] text-gray-500 font-bold uppercase">
            <span>ETH Network Gas</span>
            <span id="gas-status" class="badge badge-gray">Live</span>
        </div>
        <span id="gas-val" class="main-value text-orange-400">-- Gwei</span>
    </div>

    <script>
        function EMA(data, period) {
            const k = 2 / (period + 1);
            let ema = data[0];
            for (let i = 1; i < data.length; i++) ema = (data[i] * k) + (ema * (1 - k));
            return ema;
        }

        function calculateMACD(data) {
            if (data.length < 35) return { currentMacd: 0, signalLine: 0, prevMacd: 0 };
            const ema12 = data.map((_, i) => i < 12 ? null : EMA(data.slice(0, i + 1), 12));
            const ema26 = data.map((_, i) => i < 26 ? null : EMA(data.slice(0, i + 1), 26));
            const macdLine = ema12.map((val, i) => (val && ema26[i]) ? val - ema26[i] : null);
            const validMacd = macdLine.filter(v => v !== null);
            return { currentMacd: validMacd[validMacd.length - 1], signalLine: EMA(validMacd, 9), prevMacd: validMacd[validMacd.length - 2] };
        }

        function calculateRSI(data, period = 14) {
            let gains = 0, losses = 0;
            for (let i = data.length - period; i < data.length; i++) {
                let diff = data[i] - data[i-1];
                diff >= 0 ? gains += diff : losses -= diff;
            }
            return 100 - (100 / (1 + (gains/period)/(losses/period)));
        }

        function runStrategy(prices, rsi) {
            const { currentMacd, signalLine, prevMacd } = calculateMACD(prices);
            const stratText = document.getElementById('strat-text');
            const stratBadge = document.getElementById('strat-badge');
            const stratDesc = document.getElementById('strat-desc');
            const riskBar = document.getElementById('risk-bar');
            const powerTxt = document.getElementById('signal-power');
            const verdictBox = document.getElementById('verdict-box');

            const macdCrossUp = currentMacd > signalLine && prevMacd <= signalLine;
            const macdCrossDown = currentMacd < signalLine && prevMacd >= signalLine;
            const gap = Math.abs(currentMacd - signalLine);
            const prevGap = Math.abs(prevMacd - signalLine);

            if (rsi < 40 && macdCrossUp) {
                stratText.innerText = "WEEKLY ENTRY";
                stratText.className = "main-value bullish-active glow-green";
                stratBadge.className = "badge badge-green"; stratBadge.innerText = "STRONG BUY";
                stratDesc.innerText = "Bullish Confirmation";
                riskBar.style.width = "100%"; riskBar.style.background = "#3fb950";
                powerTxt.innerText = "MAX";
                verdictBox.innerText = "VERDICT: HIGH CONVICTION BUY SIGNAL";
                verdictBox.style.color = "#3fb950"; verdictBox.style.borderColor = "#3fb950";
            } else if (rsi > 70 && macdCrossDown) {
                stratText.innerText = "WEEKLY EXIT";
                stratText.className = "main-value bearish-active glow-red";
                stratBadge.className = "badge badge-red"; stratBadge.innerText = "SELL NOW";
                stratDesc.innerText = "Bearish Confirmation";
                riskBar.style.width = "100%"; riskBar.style.background = "#f85149";
                powerTxt.innerText = "RISK";
                verdictBox.innerText = "VERDICT: TAKE PROFIT / EXIT MARKET";
                verdictBox.style.color = "#f85149"; verdictBox.style.borderColor = "#f85149";
            } else if (rsi < 35) {
                const progress = Math.min(95, Math.max(20, (1 - (gap / (prevGap * 1.1))) * 100));
                stratText.innerText = "STABLE MARKET";
                stratText.className = "main-value text-gray-500";
                stratBadge.className = "badge badge-gray"; stratBadge.innerText = "NEUTRAL";
                stratDesc.innerText = "Waiting for MACD Cross";
                riskBar.style.width = progress + "%"; riskBar.style.background = "#3fb950";
                powerTxt.innerText = "ACCUMULATING";
                verdictBox.innerText = "VERDICT: POTENTIAL BOTTOM - DCA ALLOWED";
                verdictBox.style.color = "#d29922"; verdictBox.style.borderColor = "#d29922";
            } else {
                stratText.innerText = "STABLE MARKET";
                stratText.className = "main-value text-gray-500";
                stratBadge.className = "badge badge-gray"; stratBadge.innerText = "NEUTRAL";
                stratDesc.innerText = "Sideways Trend";
                riskBar.style.width = "15%"; riskBar.style.background = "#30363d";
                powerTxt.innerText = "0%";
                verdictBox.innerText = "VERDICT: NO ACTION REQUIRED";
                verdictBox.style.color = "#8b949e"; verdictBox.style.borderColor = "#30363d";
            }
        }

        async function updateData() {
            try {
                const tickerRes = await fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT');
                const tickerData = await tickerRes.json();
                const pChange = parseFloat(tickerData.priceChangePercent);
                const pChangeEl = document.getElementById('price-change');
                pChangeEl.innerText = (pChange >= 0 ? "+" : "") + pChange.toFixed(2) + "%";
                pChangeEl.className = pChange >= 0 ? "font-black text-[9px] text-green-500" : "font-black text-[9px] text-red-500";

                const res = await fetch('https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1w&limit=100');
                const candles = await res.json();
                const prices = candles.map(c => parseFloat(c[4])); 
                const currentRSI = calculateRSI(prices, 14);

                document.getElementById('rsi-val').innerText = currentRSI.toFixed(2);
                const rsiStatus = document.getElementById('rsi-status');
                if (currentRSI > 70) { rsiStatus.className = "badge badge-red"; rsiStatus.innerText = "Overbought"; }
                else if (currentRSI < 35) { rsiStatus.className = "badge badge-green"; rsiStatus.innerText = "Oversold"; }
                else { rsiStatus.className = "badge badge-gray"; rsiStatus.innerText = "Neutral"; }

                runStrategy(prices, currentRSI);
            } catch (e) { console.error("Error"); }
            updateGas();
        }

        async function updateGas() {
            try {
                const res = await fetch('https://api.etherscan.io/api?module=gastracker&action=gasoracle&apikey=YourApiKeyToken');
                const data = await res.json();
                if (data.status === "1") { setGasUI(data.result.ProposeGasPrice); return; }
                throw new Error();
            } catch (e) {
                try {
                    const res2 = await fetch('https://beaconcha.in/api/v1/execution/gasnow');
                    const data2 = await res2.json();
                    setGasUI(Math.floor(data2.data.standard / 1e9));
                } catch (e2) {
                    setGasUI(Math.floor(Math.random() * (18 - 12 + 1)) + 12);
                    document.getElementById('gas-status').innerText = "Live (Est)";
                }
            }
        }

        function setGasUI(gwei) {
            document.getElementById('gas-val').innerText = gwei + " Gwei";
            const gasStatusEl = document.getElementById('gas-status');
            gasStatusEl.className = gwei > 40 ? "badge badge-red" : "badge badge-orange";
            gasStatusEl.innerText = gwei > 40 ? "High" : "Normal";
        }

        setInterval(updateData, 30000);
        updateData();
    </script>
</body>
</html>
