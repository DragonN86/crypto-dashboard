<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Spot Pro - Full Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { background: #0a0c12; color: #e0e7ff; font-family: 'Inter', sans-serif; }
        .dashboard-container {
            width: 100%; max-width: 480px; background: #0f172a; border: 1px solid #334155;
            border-radius: 28px; padding: 20px; box-shadow: 0 25px 70px rgba(0,0,0,0.7);
        }
        .main-value { font-size: 2.1rem; font-weight: 900; letter-spacing: -2px; }
        .bar-bg { height: 7px; background: #1e2937; border-radius: 9999px; overflow: hidden; }
        .bar-fill { height: 100%; transition: all 1s ease; }
        .alert-flash { animation: flash 1.3s infinite; }
        @keyframes flash { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }
        .tf-btn { transition: all 0.3s ease; }
        .tf-btn.active { background: #3b82f6; color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="flex justify-center p-4 min-h-screen">
    <div class="dashboard-container">
        <!-- HEADER -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <span class="text-3xl">📊</span>
                <div>
                    <h1 class="font-black text-2xl tracking-tighter">BTC Spot</h1>
                    <p class="text-xs text-slate-400 -mt-1">Technical Analysis</p>
                </div>
            </div>
            <div class="flex bg-slate-800 rounded-2xl p-1">
                <button id="btn-weekly" class="tf-btn active px-5 py-2 text-sm font-bold rounded-xl">W1</button>
                <button id="btn-daily" class="tf-btn px-5 py-2 text-sm font-bold rounded-xl">D1</button>
            </div>
        </div>

        <!-- DCA TRACKER -->
        <div class="bg-blue-900/20 border border-blue-500/30 rounded-2xl p-4 mb-6">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">DCA Tracker</span>
                <button onclick="setEntryPrice()" class="text-[10px] bg-blue-500/30 hover:bg-blue-500/50 px-3 py-1 rounded-lg transition-colors">Sửa giá gom</button>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <p class="text-[10px] text-slate-400 uppercase font-bold">Giá trung bình</p>
                    <p id="entry-price-display" class="font-mono font-bold text-xl text-white">$0</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 uppercase font-bold">Lợi nhuận</p>
                    <p id="profit-pct" class="font-mono font-bold text-xl">0.00%</p>
                </div>
            </div>
        </div>

        <!-- INDICATORS -->
        <div class="bg-slate-900/70 border border-slate-700 rounded-3xl p-5 mb-5">
            <div class="grid grid-cols-2 gap-6 mb-6">
                <div>
                    <div class="text-[10px] uppercase tracking-widest text-slate-500 font-black mb-1">RSI (14)</div>
                    <div id="rsi-val" class="main-value text-white">50.00</div>
                    <span id="rsi-status" class="inline-block mt-3 px-3 py-1 text-[9px] font-black rounded-lg bg-slate-800">NEUTRAL</span>
                </div>
                <div>
                    <div class="text-[10px] uppercase tracking-widest text-slate-500 font-black mb-1">MACD Hist</div>
                    <div id="macd-val" class="main-value text-emerald-400">-0.00</div>
                </div>
            </div>

            <!-- VSA -->
            <div class="pt-4 border-t border-slate-800">
                <div class="flex justify-between text-[10px] text-slate-500 font-black uppercase mb-1">
                    <span>Volume Analysis (VSA)</span>
                    <span id="vol-ratio" class="text-blue-400">0% AVG</span>
                </div>
                <div id="vsa-type" class="text-[11px] font-bold text-slate-300">Scanning...</div>
                <div class="bar-bg mt-2">
                    <div id="vol-bar" class="bar-fill bg-blue-500" style="width: 0%"></div>
                </div>
            </div>

            <!-- Bollinger -->
            <div class="mt-5 pt-4 border-t border-slate-800">
                <div class="text-[10px] uppercase tracking-widest text-slate-500 font-black mb-2">Bollinger Bands (20)</div>
                <div class="flex justify-between text-xs font-mono">
                    <span class="text-red-400">Upper: <span id="bb-upper">---</span></span>
                    <span class="text-emerald-400">Lower: <span id="bb-lower">---</span></span>
                </div>
            </div>
        </div>

        <!-- STRATEGIC VERDICT -->
        <div id="verdict-box" class="rounded-3xl p-6 border border-emerald-500/30 bg-emerald-950/20">
            <div class="flex items-center gap-3 mb-3">
                <div id="signal-dot" class="w-3 h-3 bg-emerald-500 rounded-full animate-ping"></div>
                <h2 id="strat-text" class="text-xl font-black tracking-tighter uppercase">Analyzing</h2>
            </div>
            <p id="verdict-text" class="text-sm leading-relaxed text-slate-300">Đang phân tích đa chỉ báo...</p>
            <div class="mt-6">
                <div class="flex justify-between text-[10px] font-black text-slate-500 uppercase mb-2">
                    <span>Độ tin cậy chiến thuật</span>
                    <span id="confidence-val">0%</span>
                </div>
                <div class="bar-bg">
                    <div id="risk-bar" class="bar-fill bg-emerald-500" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentTF = '1w';
        let entryPrice = parseFloat(localStorage.getItem('btc_entry_price')) || 0;

        document.getElementById('entry-price-display').textContent = '$' + entryPrice.toLocaleString('en-US');

        function setEntryPrice() {
            const input = prompt("Nhập giá trung bình gom BTC (USD):", entryPrice || 65000);
            if (input === null) return;
            entryPrice = parseFloat(input) || 0;
            localStorage.setItem('btc_entry_price', entryPrice);
            document.getElementById('entry-price-display').textContent = '$' + entryPrice.toLocaleString('en-US');
            updateData();
        }

        function calculateEMA(data, period) {
            const k = 2 / (period + 1);
            let ema = data[0];
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i > 0) ema = (data[i] * k) + (ema * (1 - k));
                result.push(ema);
            }
            return result;
        }

        async function updateData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${currentTF}&limit=200`);
                const candles = await res.json();
                const prices = candles.map(c => parseFloat(c[4]));
                const volumes = candles.map(c => parseFloat(c[5]));
                const lastPrice = prices[prices.length - 1];
                const lastVol = volumes[volumes.length - 1];

                if (prices.length < 30) return;

                // === TÍNH CÁC CHỈ SỐ ===
                // RSI
                let gains = 0, losses = 0;
                for (let i = prices.length - 14; i < prices.length; i++) {
                    const diff = prices[i] - prices[i-1];
                    diff > 0 ? gains += diff : losses -= diff;
                }
                const rsi = Math.min(100, Math.max(0, 100 - (100 / (1 + (gains/14) / (losses/14 || 0.001)))));

                // MACD (đã scale)
                const ema12 = calculateEMA(prices, 12);
                const ema26 = calculateEMA(prices, 26);
                const macdLine = ema12.map((v, i) => v - ema26[i]);
                const signalLine = calculateEMA(macdLine, 9);
                let hist = macdLine[macdLine.length-1] - signalLine[signalLine.length-1];
                const prevHist = macdLine[macdLine.length-2] - signalLine[signalLine.length-2];
                hist = hist / 10; // scale để dễ đọc

                // Bollinger Bands
                const slice = prices.slice(-20);
                const sma = slice.reduce((a,b)=>a+b,0)/20;
                const stdDev = Math.sqrt(slice.reduce((a,b)=>a+(b-sma)**2,0)/20);
                const bbUpper = sma + 2*stdDev;
                const bbLower = sma - 2*stdDev;

                // Volume VSA
                const avgVol = volumes.slice(-20).reduce((a,b)=>a+b,0)/20;
                const volRatio = (lastVol / avgVol) * 100;

                // === CẬP NHẬT UI ===
                document.getElementById('rsi-val').textContent = rsi.toFixed(2);
                // RSI status
                const rsiEl = document.getElementById('rsi-status');
                if (rsi < 35) rsiEl.innerHTML = `<span class="bg-emerald-600 text-white">OVERSOLD</span>`;
                else if (rsi > 70) rsiEl.innerHTML = `<span class="bg-red-600 text-white">OVERBOUGHT</span>`;
                else rsiEl.innerHTML = `<span class="bg-slate-800">NEUTRAL</span>`;

                document.getElementById('macd-val').textContent = hist.toFixed(2);
                document.getElementById('macd-val').className = `main-value ${hist >= 0 ? 'text-emerald-400' : 'text-red-400'}`;

                document.getElementById('bb-upper').textContent = Math.round(bbUpper).toLocaleString();
                document.getElementById('bb-lower').textContent = Math.round(bbLower).toLocaleString();

                document.getElementById('vol-ratio').textContent = volRatio.toFixed(0) + "% AVG";
                document.getElementById('vol-bar').style.width = Math.min(100, volRatio) + "%";

                // DCA Profit
                if (entryPrice > 0) {
                    const profit = ((lastPrice - entryPrice) / entryPrice) * 100;
                    const pEl = document.getElementById('profit-pct');
                    pEl.textContent = (profit >= 0 ? "+" : "") + profit.toFixed(2) + "%";
                    pEl.className = `font-mono font-bold text-xl ${profit >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                }

                // === LOGIC KẾT HỢP HOÀN HẢO ===
                let score = 0;
                let reasons = [];

                // 1. RSI (40 điểm)
                if (rsi < 35) { score += 40; reasons.push("RSI Oversold"); }
                else if (rsi > 72) { score -= 35; reasons.push("RSI Overbought"); }

                // 2. Bollinger Bands (30 điểm)
                const priceVsBB = (lastPrice - bbLower) / (bbUpper - bbLower);
                if (priceVsBB < 0.22) { score += 30; reasons.push("Giá sát Lower Band"); }
                else if (priceVsBB > 0.78) { score -= 25; reasons.push("Giá sát Upper Band"); }

                // 3. MACD (20 điểm)
                if (hist > prevHist && hist < 30) { score += 20; reasons.push("MACD Histogram dốc lên"); }

                // 4. Volume VSA (15 điểm)
                if (volRatio > 140) { score += 15; reasons.push("Volume cao - Smart Money"); }
                else if (volRatio < 65) { score += 10; reasons.push("No Supply"); }

                // Normalize confidence
                let confidence = Math.max(30, Math.min(98, Math.round(score)));

                // Quyết định chiến lược
                let strat = "KIÊN NHẪN - QUAN SÁT";
                let col = "text-slate-400";
                let verdict = "Thị trường đang tích lũy, chưa có tín hiệu rõ ràng.";

                if (score >= 75) {
                    strat = "VÙNG GOM DCA";
                    col = "text-emerald-400";
                    verdict = "Tín hiệu cực mạnh: RSI oversold + giá rẻ + volume xác nhận. Nên DCA Spot dài hạn.";
                } else if (score <= -40) {
                    strat = "CHỐT LỜI / REBALANCE";
                    col = "text-red-400";
                    verdict = "Vùng quá mua mạnh. Nên chốt lời một phần hoặc tái cấu trúc danh mục.";
                } else if (score >= 45) {
                    strat = "PHỤC HỒI - NẮM GIỮ";
                    col = "text-sky-400";
                    verdict = "Áp lực bán suy yếu, xu hướng phục hồi đang hình thành.";
                }

                // Hiển thị
                document.getElementById('strat-text').textContent = strat;
                document.getElementById('strat-text').className = `text-xl font-black tracking-tighter ${col} ${confidence > 85 ? 'alert-flash' : ''}`;
                document.getElementById('verdict-text').textContent = verdict;
                document.getElementById('confidence-val').textContent = confidence + "%";
                document.getElementById('risk-bar').style.width = confidence + "%";
                document.getElementById('risk-bar').style.background = col.includes('emerald') ? "#10b981" : col.includes('red') ? "#ef4444" : "#38bdf8";

            } catch (e) { console.error(e); }
        }

        // Timeframe switch
        document.getElementById('btn-weekly').onclick = () => { currentTF = '1w'; updateActiveButton(); updateData(); };
        document.getElementById('btn-daily').onclick = () => { currentTF = '1d'; updateActiveButton(); updateData(); };

        function updateActiveButton() {
            document.getElementById('btn-weekly').classList.toggle('active', currentTF === '1w');
            document.getElementById('btn-daily').classList.toggle('active', currentTF === '1d');
        }

        setInterval(updateData, 25000);
        updateData();
    </script>
</body>
</html>
