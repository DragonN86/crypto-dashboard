<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Spot Pro - Full Analysis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        /* Định nghĩa màu sắc thương hiệu WinTrack */
        :root {
            --bg-main: #0d1117;     /* Màu nền chính tiệp với file index */
            --bg-card: #161b22;     /* Màu nền card con */
            --text-main: #c9d1d9;
            --accent-gold: #f2cc60;  /* Màu vàng WinTrack */
            --accent-blue: #58a6ff;
            --success-green: #3fb950;
            --danger-red: #f85149;
            --border-color: #30363d;
        }

        body { 
            background: var(--bg-main); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; /* Chỉ scroll nội dung bên trong, không scroll cả body */
        }

        /* Container chính tối ưu cho Iframe */
        .dashboard-container {
            width: 100%; height: 100vh;
            padding: 16px;
            display: flex; flex-direction: column;
            gap: 16px;
        }

        /* Phông chữ số hầm hố kiểu TradingView */
        .main-value { 
            font-size: 3rem; /* Tăng kích thước số RSI */
            font-weight: 900; 
            letter-spacing: -3px; 
            line-height: 1;
        }
        
        /* Style cho các thanh bar */
        .bar-bg { height: 6px; background: #21262d; border-radius: 99px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 99px; transition: all 1s ease; }

        /* Animation nhấp nháy cho tín hiệu mạnh */
        .alert-flash { animation: flash 1.3s infinite; }
        @keyframes flash { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Timeframe Buttons */
        .tf-btn { transition: all 0.2s ease; color: #8b949e; border: 1px solid transparent; }
        .tf-btn:hover { background: rgba(255,255,255,0.03); color: white; }
        .tf-btn.active { 
            background: #21262d; 
            color: var(--accent-blue); 
            border-color: #444c56;
            font-weight: 700;
        }

        /* Hiệu ứng Glow cho các con số */
        .glow-text-green { text-shadow: 0 0 12px rgba(63, 185, 80, 0.5); }
        .glow-text-red { text-shadow: 0 0 12px rgba(248, 81, 73, 0.5); }
        .glow-text-gold { text-shadow: 0 0 12px rgba(242, 204, 96, 0.4); }

        /* Scrollbar ẩn đẹp mắt */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="flex justify-between items-center pb-3 border-b border-[#30363d]">
            <div class="flex items-center gap-2">
                <span class="text-xl text-gray-500">📊</span>
                <h1 class="font-extrabold text-sm uppercase tracking-wider text-white">BTC Spot Technical</h1>
            </div>
            <div class="flex bg-[#0d1117] rounded-xl p-1 border border-[#30363d]">
                <button id="btn-weekly" class="tf-btn px-4 py-1.5 text-xs font-bold rounded-lg active">W1</button>
                <button id="btn-daily" class="tf-btn px-4 py-1.5 text-xs font-bold rounded-lg">D1</button>
            </div>
        </div>

        <div class="bg-[#1c2128] border border-[#30363d] rounded-2xl p-5 shadow-inner">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Giá Vốn Trung Bình (DCA)</span>
                <button onclick="setEntryPrice()" class="text-[10px] bg-[#21262d] text-gray-400 hover:text-white border border-[#30363d] hover:border-gray-500 px-3 py-1 rounded-lg transition-all">Sửa giá gom</button>
            </div>
            <div class="flex items-end justify-between gap-4">
                <p id="entry-price-display" class="font-mono font-black text-3xl text-white glow-text-gold">$0</p>
                <div class="text-right flex-shrink-0">
                    <p class="text-[10px] text-slate-500 uppercase font-bold">Lợi nhuận</p>
                    <p id="profit-pct" class="font-mono font-bold text-lg text-gray-500">0.00%</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-[#161b22] border border-[#30363d] rounded-2xl p-5 flex flex-col justify-between">
                <div>
                    <div class="text-[10px] uppercase tracking-widest text-slate-500 font-black mb-1">RSI (14)</div>
                    <div id="rsi-val" class="main-value text-white">50.0</div>
                </div>
                <div id="rsi-status-container" class="mt-4">
                    <span id="rsi-status" class="inline-block px-3 py-1 text-[9px] font-black rounded-full bg-[#21262d] text-gray-400">NEUTRAL</span>
                </div>
            </div>

            <div class="bg-[#161b22] border border-[#30363d] rounded-2xl p-5">
                <div class="text-[10px] uppercase tracking-widest text-slate-500 font-black mb-1">MACD Hist</div>
                <div id="macd-val" class="main-value text-success-green glow-text-green">0.00</div>
                <p class="text-[10px] text-slate-600 mt-2 font-mono">Scale x10 for view</p>
            </div>
        </div>

        <div class="flex-grow bg-[#161b22] border border-[#30363d] rounded-2xl p-5 overflow-y-auto">
            <div class="mb-5 pb-5 border-b border-[#30363d]">
                <div class="flex justify-between text-[10px] text-slate-500 font-black uppercase mb-1.5">
                    <span>Volume VSA</span>
                    <span id="vol-ratio" class="text-blue-400 font-mono">0% AVG</span>
                </div>
                <div id="vsa-type" class="text-xs font-semibold text-slate-300">Scanning supply/demand...</div>
                <div class="bar-bg mt-3">
                    <div id="vol-bar" class="bar-fill bg-blue-500" style="width: 0%"></div>
                </div>
            </div>

            <div>
                <div class="text-[10px] uppercase tracking-widest text-slate-500 font-black mb-3">Bollinger Bands (20)</div>
                <div class="flex justify-between items-center bg-[#0d1117] rounded-xl p-3 border border-[#30363d]">
                    <div class="text-center">
                        <span class="block text-[9px] text-red-500 uppercase font-bold">Upper</span>
                        <span id="bb-upper" class="font-mono text-sm text-red-400 glow-text-red">---</span>
                    </div>
                    <div class="h-6 w-[1px] bg-[#30363d]"></div>
                    <div class="text-center">
                        <span class="block text-[9px] text-success-green uppercase font-bold">Lower</span>
                        <span id="bb-lower" class="font-mono text-sm text-success-green glow-text-green">---</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="verdict-box" class="rounded-2xl p-5 border border-slate-700 bg-[#1c2128]">
            <div class="flex items-center gap-2.5 mb-2.5">
                <div id="signal-dot" class="w-2.5 h-2.5 bg-slate-500 rounded-full"></div>
                <h2 id="strat-text" class="text-lg font-black tracking-tighter uppercase text-white">Analyzing</h2>
            </div>
            <p id="verdict-text" class="text-xs leading-relaxed text-slate-400">Đang quét đa chỉ báo để đưa ra kết luận chiến thuật...</p>
        </div>
    </div>

    <script>
        // --- GIỮ NGUYÊN TOÀN BỘ LOGIC JAVASCRIPT GỐC ---
        let currentTF = '1w';
        let entryPrice = parseFloat(localStorage.getItem('btc_entry_price')) || 0;

        document.getElementById('entry-price-display').textContent = '$' + entryPrice.toLocaleString('en-US');

        function setEntryPrice() {
            const input = prompt("Nhập giá trung bình gom BTC (USD):", entryPrice || 65000);
            if (input === null) return;
            entryPrice = parseFloat(input) || 0;
            localStorage.setItem('btc_entry_price', entryPrice);
            document.getElementById('entry-price-display').textContent = '$' + entryPrice.toLocaleString('en-US');
            updateData();
        }

        function calculateEMA(data, period) {
            const k = 2 / (period + 1);
            let ema = data[0];
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i > 0) ema = (data[i] * k) + (ema * (1 - k));
                result.push(ema);
            }
            return result;
        }

        async function updateData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${currentTF}&limit=200`);
                const candles = await res.json();
                const prices = candles.map(c => parseFloat(c[4]));
                const volumes = candles.map(c => parseFloat(c[5]));
                const lastPrice = prices[prices.length - 1];
                const lastVol = volumes[volumes.length - 1];

                if (prices.length < 30) return;

                // === TÍNH CÁC CHỈ SỐ ===
                // RSI
                let gains = 0, losses = 0;
                for (let i = prices.length - 14; i < prices.length; i++) {
                    const diff = prices[i] - prices[i-1];
                    diff > 0 ? gains += diff : losses -= diff;
                }
                const rsi = Math.min(100, Math.max(0, 100 - (100 / (1 + (gains/14) / (losses/14 || 0.001)))));

                // MACD (đã scale)
                const ema12 = calculateEMA(prices, 12);
                const ema26 = calculateEMA(prices, 26);
                const macdLine = ema12.map((v, i) => v - ema26[i]);
                const signalLine = calculateEMA(macdLine, 9);
                let hist = macdLine[macdLine.length-1] - signalLine[signalLine.length-1];
                const prevHist = macdLine[macdLine.length-2] - signalLine[signalLine.length-2];
                hist = hist / 10; // scale để dễ đọc

                // Bollinger Bands
                const slice = prices.slice(-20);
                const sma = slice.reduce((a,b)=>a+b,0)/20;
                const stdDev = Math.sqrt(slice.reduce((a,b)=>a+(b-sma)**2,0)/20);
                const bbUpper = sma + 2*stdDev;
                const bbLower = sma - 2*stdDev;

                // Volume VSA
                const avgVol = volumes.slice(-20).reduce((a,b)=>a+b,0)/20;
                const volRatio = (lastVol / avgVol) * 100;

                // === CẬP NHẬT UI ===
                document.getElementById('rsi-val').textContent = rsi.toFixed(1); // Chỉ lấy 1 số thập phân cho gọn
                // RSI status
                const rsiEl = document.getElementById('rsi-status');
                if (rsi < 35) {
                    rsiEl.textContent = 'OVERSOLD';
                    rsiEl.className = "inline-block px-3 py-1 text-[9px] font-black rounded-full bg-emerald-950/50 text-success-green border border-success-green/30 alert-flash";
                } else if (rsi > 70) {
                    rsiEl.textContent = 'OVERBOUGHT';
                    rsiEl.className = "inline-block px-3 py-1 text-[9px] font-black rounded-full bg-red-950/50 text-danger-red border border-danger-red/30 alert-flash";
                } else {
                    rsiEl.textContent = 'NEUTRAL';
                    rsiEl.className = "inline-block px-3 py-1 text-[9px] font-black rounded-full bg-[#21262d] text-gray-400";
                }
