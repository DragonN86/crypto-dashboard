<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BTC Spot Pro - WinTrack 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        
        :root {
            --bg-main: #0d1117;
            --bg-card: #161b22;
            --border-color: #30363d;
            --accent-gold: #f2cc60;
            --success-green: #3fb950;
            --danger-red: #f85149;
        }

        body { 
            background: var(--bg-main); 
            color: #c9d1d9; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0;
            overflow: hidden; /* Chống cuộn toàn trang */
        }

        .dashboard-container {
            width: 100%; height: 100vh;
            padding: 12px;
            display: flex; flex-direction: column;
            gap: 10px;
        }

        .main-value { 
            font-size: 2.2rem; /* Kích thước tối ưu để không bị tràn */
            font-weight: 900; 
            letter-spacing: -1.5px; 
            line-height: 1;
        }
        
        .bar-bg { height: 4px; background: #21262d; border-radius: 99px; overflow: hidden; }
        .bar-fill { height: 100%; transition: all 1s ease; }

        .tf-btn { transition: all 0.2s ease; border: 1px solid transparent; }
        .tf-btn.active { 
            background: #21262d; 
            color: #58a6ff; 
            border-color: #444c56;
        }

        /* Hiệu ứng nhấp nháy cho tín hiệu mạnh */
        .alert-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* Tối ưu scrollbar cho các phần nội dung nhỏ */
        .custom-scroll::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- TOP NAV -->
        <div class="flex justify-between items-center shrink-0">
            <div class="flex items-center gap-2">
                <span class="text-lg">📊</span>
                <h1 class="font-black text-[11px] uppercase tracking-tighter text-white">BTC Spot Technical</h1>
            </div>
            <div class="flex bg-[#0d1117] rounded-lg p-0.5 border border-[#30363d]">
                <button id="btn-weekly" class="tf-btn px-3 py-1 text-[10px] font-bold rounded-md active">W1</button>
                <button id="btn-daily" class="tf-btn px-3 py-1 text-[10px] font-bold rounded-md">D1</button>
            </div>
        </div>

        <!-- DCA TRACKER -->
        <div class="bg-[#1c2128] border border-[#30363d] rounded-xl p-3 shrink-0">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Giá Vốn DCA</span>
                <button onclick="setEntryPrice()" class="text-[8px] bg-[#21262d] text-gray-400 px-2 py-0.5 rounded border border-[#30363d]">SỬA</button>
            </div>
            <div class="flex items-baseline justify-between">
                <p id="entry-price-display" class="font-mono font-black text-xl text-white">$0</p>
                <p id="profit-pct" class="font-mono font-bold text-xs text-gray-500">0.00%</p>
            </div>
        </div>

        <!-- MAIN INDICATORS -->
        <div class="grid grid-cols-2 gap-3 shrink-0">
            <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-3">
                <span class="text-[9px] uppercase tracking-widest text-gray-500 font-bold">RSI (14)</span>
                <div id="rsi-val" class="main-value text-white mt-1">50.0</div>
                <div id="rsi-status" class="mt-2 text-[8px] font-black px-2 py-0.5 rounded bg-[#21262d] inline-block">NEUTRAL</div>
            </div>
            <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-3">
                <span class="text-[9px] uppercase tracking-widest text-gray-500 font-bold">MACD Hist</span>
                <div id="macd-val" class="main-value text-emerald-400 mt-1">0.00</div>
                <span class="text-[8px] text-gray-600 font-mono">Real-time update</span>
            </div>
        </div>

        <!-- VSA & BB -->
        <div class="bg-[#161b22] border border-[#30363d] rounded-xl p-3 flex-grow custom-scroll overflow-y-auto">
            <div class="mb-3">
                <div class="flex justify-between text-[9px] font-bold uppercase mb-1">
                    <span class="text-gray-500">Volume Analysis</span>
                    <span id="vol-ratio" class="text-blue-400">0% AVG</span>
                </div>
                <div class="bar-bg mb-1"><div id="vol-bar" class="bar-fill bg-blue-500" style="width: 0%"></div></div>
                <div id="vsa-type" class="text-[9px] text-gray-400 italic font-medium">Scanning...</div>
            </div>

            <div class="pt-2 border-t border-[#30363d]">
                <span class="text-[9px] uppercase font-bold text-gray-500 block mb-2">Bollinger Bands (20)</span>
                <div class="grid grid-cols-2 gap-2 text-center">
                    <div class="bg-[#0d1117] p-1.5 rounded-lg border border-[#30363d]">
                        <span class="block text-[8px] text-red-500 font-bold uppercase">Upper</span>
                        <span id="bb-upper" class="font-mono text-[10px] text-red-400">---</span>
                    </div>
                    <div class="bg-[#0d1117] p-1.5 rounded-lg border border-[#30363d]">
                        <span class="block text-[8px] text-emerald-500 font-bold uppercase">Lower</span>
                        <span id="bb-lower" class="font-mono text-[10px] text-emerald-400">---</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- VERDICT -->
        <div id="verdict-box" class="bg-[#1c2128] border border-[#30363d] rounded-xl p-3 shrink-0">
            <div class="flex items-center gap-2 mb-1">
                <div id="signal-dot" class="w-2 h-2 rounded-full bg-gray-500"></div>
                <h2 id="strat-text" class="text-xs font-black uppercase text-white">Analyzing Market</h2>
            </div>
            <p id="verdict-text" class="text-[10px] leading-tight text-gray-500">Hệ thống đang quét tín hiệu kỹ thuật...</p>
        </div>
    </div>

    <script>
        let currentTF = '1w';
        let entryPrice = parseFloat(localStorage.getItem('btc_entry_price')) || 0;
        document.getElementById('entry-price-display').textContent = '$' + entryPrice.toLocaleString();

        function setEntryPrice() {
            const input = prompt("Nhập giá gom BTC:", entryPrice || 60000);
            if (input === null) return;
            entryPrice = parseFloat(input) || 0;
            localStorage.setItem('btc_entry_price', entryPrice);
            location.reload();
        }

        async function updateData() {
            try {
                const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=${currentTF}&limit=100`);
                const candles = await res.json();
                const prices = candles.map(c => parseFloat(c[4]));
                const volumes = candles.map(c => parseFloat(c[5]));
                const lastPrice = prices[prices.length - 1];

                // RSI 14
                let gains = 0, losses = 0;
                for (let i = prices.length - 14; i < prices.length; i++) {
                    const diff = prices[i] - prices[i-1];
                    diff > 0 ? gains += diff : losses -= diff;
                }
                const rsi = 100 - (100 / (1 + (gains/14) / (losses/14 || 1)));

                // BB 20
                const slice = prices.slice(-20);
                const sma = slice.reduce((a,b)=>a+b,0)/20;
                const stdDev = Math.sqrt(slice.reduce((a,b)=>a+(b-sma)**2,0)/20);

                // UI Update
                document.getElementById('rsi-val').textContent = rsi.toFixed(1);
                const rsiStatus = document.getElementById('rsi-status');
                if (rsi < 35) { rsiStatus.className = "mt-2 text-[8px] font-black px-2 py-0.5 rounded bg-emerald-900 text-emerald-400 alert-pulse"; rsiStatus.innerText = "OVERSOLD"; }
                else if (rsi > 70) { rsiStatus.className = "mt-2 text-[8px] font-black px-2 py-0.5 rounded bg-red-900 text-red-400 alert-pulse"; rsiStatus.innerText = "OVERBOUGHT"; }
                else { rsiStatus.className = "mt-2 text-[8px] font-black px-2 py-0.5 rounded bg-[#21262d] text-gray-400"; rsiStatus.innerText = "NEUTRAL"; }

                document.getElementById('bb-upper').innerText = Math.round(sma + 2*stdDev).toLocaleString();
                document.getElementById('bb-lower').innerText = Math.round(sma - 2*stdDev).toLocaleString();

                if (entryPrice > 0) {
                    const profit = ((lastPrice - entryPrice) / entryPrice) * 100;
                    const pEl = document.getElementById('profit-pct');
                    pEl.innerText = (profit >= 0 ? "+" : "") + profit.toFixed(2) + "%";
                    pEl.className = `font-mono font-bold text-xs ${profit >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                }

                // Strategy Logic (Score)
                let score = 0;
                if (rsi < 35) score += 50; else if (rsi > 70) score -= 50;
                if (lastPrice < (sma - stdDev)) score += 20;

                const stratText = document.getElementById('strat-text');
                const verdictBox = document.getElementById('verdict-box');
                const signalDot = document.getElementById('signal-dot');

                if (score >= 40) {
                    stratText.innerText = "VÙNG GOM DCA";
                    stratText.className = "text-xs font-black uppercase text-emerald-400";
                    signalDot.className = "w-2 h-2 rounded-full bg-emerald-500 animate-ping";
                    document.getElementById('verdict-text').innerText = "Tín hiệu RSI thấp, vùng giá chiết khấu tốt cho Spot.";
                } else if (score <= -40) {
                    stratText.innerText = "CHỐT LỜI/RỦI RO";
                    stratText.className = "text-xs font-black uppercase text-red-400";
                    signalDot.className = "w-2 h-2 rounded-full bg-red-500 animate-ping";
                    document.getElementById('verdict-text').innerText = "Thị trường quá nóng, hạn chế mua mới, canh chốt lời.";
                } else {
                    stratText.innerText = "KIÊN NHẪN QUAN SÁT";
                    stratText.className = "text-xs font-black uppercase text-gray-300";
                    signalDot.className = "w-2 h-2 rounded-full bg-gray-500";
                    document.getElementById('verdict-text').innerText = "Thị trường đi ngang, đợi tín hiệu rõ ràng hơn.";
                }

            } catch (e) { console.error("Update Error"); }
        }

        document.getElementById('btn-weekly').onclick = () => { currentTF = '1w'; updateActive(); updateData(); };
        document.getElementById('btn-daily').onclick = () => { currentTF = '1d'; updateActive(); updateData(); };

        function updateActive() {
            document.getElementById('btn-weekly').classList.toggle('active', currentTF === '1w');
            document.getElementById('btn-daily').classList.toggle('active', currentTF === '1d');
        }

        setInterval(updateData, 30000);
        updateData();
    </script>
</body>
</html>
